<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NootaChat Ultimate Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a29bfe; --primary-dark: #6c5ce7;
            --danger: #ff7675; --ghost: #00cec9; --whisper: #fdcb6e; --success: #55efc4;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; 
            color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .glass-panel { 
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); 
        }

        .hidden { display: none !important; }
        
        .btn-glass { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border: none; padding: 16px; border-radius: 16px; color: white; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }
        .btn-glass:active { transform: scale(0.97); }
        
        .input-glass { 
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 16px; 
            padding: 16px; color: white; width: 100%; text-align: center; margin-bottom: 15px; transition: 0.3s;
        }
        .input-glass:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 15px rgba(162, 155, 254, 0.3); }

        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; display: flex; z-index: 100; padding: 10px; border-radius: 35px;}
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); font-weight: bold; text-shadow: 0 0 10px rgba(162, 155, 254, 0.5); transform: translateY(-3px); }

        /* Notes (Stories) */
        .notes-bar { display: flex; gap: 15px; padding: 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--glass-border); }
        .note-wrap { min-width: 70px; text-align: center; position: relative; cursor: pointer; }
        .note-img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; object-fit: cover; }
        
        /* Floating Action Button */
        .fab-btn { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(108, 92, 231, 0.6); cursor: pointer; transition: 0.3s; z-index: 90; border: 1px solid rgba(255,255,255,0.2); }
        .fab-btn:active { transform: scale(0.9); }

        /* Chat Window */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 12, 41, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 300; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: linear-gradient(135deg, var(--primary-dark), #4834d4); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        .msg.loading { opacity: 0.6; }
        
        .msg-img { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        .view-once-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        /* Apple Style Audio Player */
        .ios-audio { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 30px; cursor: pointer; width: 200px; border: 1px solid rgba(255,255,255,0.1); }
        .ios-audio .play-btn { width: 30px; height: 30px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .ios-audio .waveform { flex: 1; display: flex; align-items: center; gap: 2px; height: 20px; }
        .ios-audio .waveform span { flex: 1; background: rgba(255,255,255,0.5); border-radius: 2px; animation: wave 1s infinite ease-in-out paused; }
        .ios-audio.playing .waveform span { animation-play-state: running; }
        .ios-audio.playing .play-btn { background: var(--danger); }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 18px; } }
        
        /* Input Area */
        .input-area { padding: 15px; background: rgba(255,255,255,0.05); border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px); }
        .action-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 18px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .action-btn.active-record { background: var(--danger); animation: pulse 1s infinite; }
        .action-btn.active-1x { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        
        /* Posts Feed */
        .post-card { padding: 20px; margin-bottom: 15px; border-radius: 20px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-screen" class="modal">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h1 style="color:var(--primary); font-size: 35px; margin-bottom: 5px;">NootaChat</h1>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 30px; font-size: 14px;">الإصدار الزجاجي الفاخر</p>
            <input type="email" id="email" class="input-glass" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" class="input-glass" placeholder="كلمة المرور">
            <button class="btn-glass" onclick="authAction('login')">دخول</button>
            <p onclick="document.getElementById('signup-modal').classList.remove('hidden')" style="margin-top: 20px; font-size: 13px; color: var(--primary); cursor: pointer;">إنشاء حساب جديد</p>
        </div>
    </div>

    <div id="signup-modal" class="modal hidden">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h2 style="margin-bottom: 20px;">تسجيل جديد</h2>
            <input type="email" id="s-email" class="input-glass" placeholder="بريد إلكتروني صالح">
            <input type="password" id="s-pass" class="input-glass" placeholder="كلمة مرور قوية">
            <button class="btn-glass" onclick="authAction('signup')">إنشاء الحساب</button>
            <p onclick="document.getElementById('signup-modal').classList.add('hidden')" style="margin-top: 15px; color: #ccc; cursor: pointer;">إلغاء</p>
        </div>
    </div>

    <div id="setup-screen" class="modal hidden">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h2 id="setup-title" style="margin-bottom: 20px;">هويتك الرقمية</h2>
            <div style="position:relative; width:110px; height:110px; margin:0 auto 20px;">
                <img id="prev-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100%; height:100%; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                <input type="file" id="img-input" accept="image/*" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
            </div>
            <input type="text" id="set-user" class="input-glass" placeholder="Username (للبحث عنك)">
            <input type="text" id="set-nick" class="input-glass" placeholder="اللقب الظاهر للأصدقاء">
            <button class="btn-glass" onclick="saveUser()">حفظ</button>
            <p id="close-setup-btn" onclick="document.getElementById('setup-screen').classList.add('hidden')" class="hidden" style="margin-top:15px; color:#ccc; cursor:pointer;">إغلاق</p>
        </div>
    </div>

    <div id="app-screen" class="hidden" style="height:100%; display:flex; flex-direction:column;">
        
        <div id="page-chats" style="flex:1; overflow-y:auto; padding-bottom:100px;">
            <div style="padding: 25px 20px 10px; font-size: 28px; font-weight: 800;">الدردشات</div>
            <div class="notes-bar" id="notes-list">
                <div class="note-wrap" onclick="addNote()">
                    <div class="note-img" style="border: 2px dashed rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; font-size:25px; color:rgba(255,255,255,0.6);">+</div>
                    <span style="font-size:11px; margin-top:5px; display:block;">حالة جديدة</span>
                </div>
            </div>
            <div id="chat-items-list" style="padding: 10px 20px;"></div>
            <div class="fab-btn" onclick="findFriend()">+</div>
        </div>

        <div id="page-posts" class="hidden" style="flex:1; overflow-y:auto; padding:20px; padding-bottom:100px;">
            <div style="font-size: 28px; font-weight: 800; margin-bottom: 20px;">المجتمع</div>
            <div class="glass-panel" style="padding: 15px; margin-bottom: 20px;">
                <textarea id="post-input" class="input-glass" placeholder="بم تفكر الآن؟" style="resize:none; height:80px;"></textarea>
                <button class="btn-glass" onclick="publishPost()" style="padding:10px;">نشر</button>
            </div>
            <div id="posts-container"></div>
        </div>

        <div id="page-profile" class="hidden" style="flex:1; padding:50px 20px; text-align:center;">
            <div class="glass-panel" style="padding: 40px 20px;">
                <img id="my-avatar" src="" style="width:140px; height:140px; border-radius:50%; border:4px solid var(--primary); object-fit:cover; margin-bottom: 15px;">
                <h2 id="my-name-display" style="margin-bottom: 5px;">...</h2>
                <p id="my-user-display" style="color:rgba(255,255,255,0.5); margin-bottom: 30px;">@...</p>
                <button class="btn-glass" style="background: rgba(255,255,255,0.1); margin-bottom: 15px;" onclick="editProfile()">تعديل البروفايل</button>
                <button class="btn-glass" style="background: var(--danger);" onclick="location.reload()">تسجيل خروج</button>
            </div>
        </div>

        <div class="glass-panel bottom-nav">
            <div class="nav-item active" onclick="tab('chats', this)"><span style="font-size:22px;">💬</span>دردشة</div>
            <div class="nav-item" onclick="tab('posts', this)"><span style="font-size:22px;">🌐</span>المنشورات</div>
            <div class="nav-item" onclick="tab('profile', this)"><span style="font-size:22px;">👤</span>حسابي</div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">➔</button>
                <img id="h-img" src="" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                <div onclick="openOptions()" style="cursor:pointer;">
                    <b id="h-name" style="font-size: 16px;">...</b><br>
                    <small id="chat-status" style="color:var(--primary); font-size: 11px;">متصل</small>
                </div>
            </div>
        </div>
        
        <div class="msg-area" id="msg-area"></div>

        <div class="input-area" id="input-bar">
            <button id="record-btn" class="action-btn" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
            
            <input type="file" id="chat-img" class="hidden" accept="image/*" onchange="sendImageMsg(this)">
            <button class="action-btn" onclick="document.getElementById('chat-img').click()">🖼️</button>
            
            <button id="view-once-btn" class="action-btn" style="font-size:12px; font-weight:bold;" onclick="toggle1x()">1x</button>
            
            <input type="text" id="msg-input" placeholder="اكتب رسالة..." style="flex:1; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:12px 15px; color:white; font-size: 14px;">
            <button onclick="sendTextMsg()" class="action-btn" style="background: var(--primary);">➤</button>
        </div>
    </div>

    <div id="view-once-modal" class="modal hidden">
        <div style="text-align:center;">
            <img id="view-once-img" src="" style="max-width:90vw; max-height:80vh; border-radius:20px; margin-bottom:20px; box-shadow:0 0 30px rgba(0,0,0,0.8);">
            <br>
            <button class="btn-glass" style="background:var(--danger); width:auto; padding:10px 30px;" onclick="closeViewOnce()">إغلاق وحذف 🗑️</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        // إضافة Firestore للمنشورات
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const dbFS = getFirestore(app); // تعريف الفايرستور

        let me = null, activeF = null, activeC = null;
        let is1x = false;
        let mediaRecorder, audioChunks = [];
        let currentlyPlayingAudio = null;

        // التحويل لـ Base64
        const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); });
        document.getElementById('img-input').onchange = async e => { if(e.target.files[0]) document.getElementById('prev-img').src = await toB64(e.target.files[0]); };

        window.authAction = async (t) => {
            const e = document.getElementById(t==='login'?'email':'s-email').value;
            const p = document.getElementById(t==='login'?'pass':'s-pass').value;
            try { t==='login' ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p); }
            catch(err) { alert("بيانات غير صحيحة أو البريد مستخدم."); }
        };

        window.saveUser = async () => {
            const u = document.getElementById('set-user').value.trim().toLowerCase(), n = document.getElementById('set-nick').value.trim(), img = document.getElementById('prev-img').src;
            if(!n) return alert("اللقب مطلوب");
            if(!me) {
                const s = await get(child(ref(db), 'usernames/'+u));
                if(s.exists()) return alert("اسم المستخدم مأخوذ مسبقاً");
                await set(ref(db, 'usernames/'+u), auth.currentUser.uid);
                await set(ref(db, 'users/'+auth.currentUser.uid), { u, n, img });
            } else { await update(ref(db, 'users/'+auth.currentUser.uid), { n, img }); }
            location.reload();
        };

        window.tab = (t, el) => {
            document.getElementById('page-chats').classList.toggle('hidden', t!=='chats');
            document.getElementById('page-posts').classList.toggle('hidden', t!=='posts');
            document.getElementById('page-profile').classList.toggle('hidden', t!=='profile');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        /* نظام الدردشة */
        window.findFriend = async () => {
            const u = prompt("أدخل Username صديقك:"); if(!u) return;
            const s = await get(child(ref(db), 'usernames/'+u.toLowerCase()));
            if(s.exists() && s.val() !== auth.currentUser.uid) {
                const fData = (await get(child(ref(db), 'users/'+s.val()))).val();
                openChat(s.val(), fData.n, fData.img);
            } else alert("مستخدم غير موجود!");
        };

        window.openChat = async (id, name, img) => {
            activeF = id; activeC = [auth.currentUser.uid, id].sort().join("_");
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('h-name').innerText = name;
            document.getElementById('h-img').src = img;
            await update(ref(db, `friends/${auth.currentUser.uid}/${id}`), { n: name, img: img });
            await update(ref(db, `friends/${id}/${auth.currentUser.uid}`), { n: me.n, img: me.img });
            loadMsgs();
        };
        window.closeChat = () => document.getElementById('chat-window').classList.add('hidden');

        window.toggle1x = () => {
            is1x = !is1x;
            document.getElementById('view-once-btn').classList.toggle('active-1x', is1x);
        };

        /* إرسال رسالة بنظام عدم اللاج (Optimistic) */
        window.sendTextMsg = () => {
            const text = document.getElementById('msg-input').value; if(!text) return;
            document.getElementById('msg-input').value = "";
            renderOptimisticMsg({ t: text }); // عرض فوراً
            push(ref(db, 'messages/'+activeC), { s: auth.currentUser.uid, time: Date.now(), t: text });
        };

        window.sendImageMsg = async (input) => {
            if(!input.files[0]) return;
            const b64 = await toB64(input.files[0]);
            renderOptimisticMsg({ img: b64, viewOnce: is1x }); // عرض فوراً
            push(ref(db, 'messages/'+activeC), { s: auth.currentUser.uid, time: Date.now(), img: b64, viewOnce: is1x });
            is1x = false; document.getElementById('view-once-btn').classList.remove('active-1x');
            input.value = "";
        };

        function renderOptimisticMsg(data) {
            const box = document.getElementById('msg-area');
            const d = document.createElement('div');
            d.className = 'glass-panel msg sent loading';
            if(data.t) d.innerText = data.t;
            if(data.img) {
                if(data.viewOnce) d.innerHTML = '📸 صورة مؤقتة (جاري الإرسال...)';
                else d.innerHTML = `<img src="${data.img}" class="msg-img">`;
            }
            if(data.audio) d.innerHTML = '🎤 جاري إرسال المقطع...';
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        /* نظام الصوتيات ستايل آبل */
        window.startRecord = async () => {
            document.getElementById('record-btn').classList.add('active-record');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const base64Audio = await toB64(audioBlob);
                    renderOptimisticMsg({ audio: true });
                    push(ref(db, 'messages/'+activeC), { s: auth.currentUser.uid, time: Date.now(), a: base64Audio });
                    audioChunks = [];
                };
                mediaRecorder.start();
            } catch(e) { alert("الميكروفون مطلوب"); document.getElementById('record-btn').classList.remove('active-record'); }
        };
        window.stopRecord = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('record-btn').classList.remove('active-record'); }};

        window.playAppleAudio = (element, src) => {
            if(currentlyPlayingAudio) currentlyPlayingAudio.pause();
            const audio = new Audio(src);
            currentlyPlayingAudio = audio;
            element.classList.add('playing');
            element.querySelector('.play-btn').innerText = "⏸";
            audio.play();
            audio.onended = () => { element.classList.remove('playing'); element.querySelector('.play-btn').innerText = "▶"; };
        };

        function loadMsgs() {
            onValue(ref(db, 'messages/'+activeC), snap => {
                const box = document.getElementById('msg-area'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val(), d = document.createElement('div');
                    d.className = `glass-panel msg ${m.s === auth.currentUser.uid ? 'sent' : 'received'} `;
                    
                    let inner = "";
                    if(m.t) inner += m.t;
                    else if(m.a) {
                        inner += `
                        <div class="ios-audio" onclick="playAppleAudio(this, '${m.a}')">
                            <div class="play-btn">▶</div>
                            <div class="waveform"><span></span><span></span><span></span><span></span><span></span><span></span></div>
                        </div>`;
                    }
                    else if(m.img) {
                        if(m.viewOnce) {
                            if(m.s === auth.currentUser.uid) inner += `<div style="color:var(--danger); font-size:12px;">📸 تم إرسال صورة مؤقتة</div>`;
                            else inner += `<button class="view-once-btn" onclick="openViewOnce('${c.key}', '${m.img}')">📸 اضغط لرؤية الصورة 1x</button>`;
                        } else {
                            inner += `<img src="${m.img}" class="msg-img">`;
                        }
                    }
                    
                    let timeStr = new Date(m.time).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
