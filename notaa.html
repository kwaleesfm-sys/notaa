<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAGEL V3</title>

<style>
:root{
  --bg:#0d0d12;
  --card:#1a1a24;
  --blue:#00f3ff;
  --pink:#ff007c;
}
body{margin:0;background:var(--bg);color:#fff;font-family:sans-serif}
.hidden{display:none}
.screen{height:80vh;overflow:auto;padding:10px}
.card{background:var(--card);padding:10px;margin:10px;border-radius:10px}
input,button,textarea{
  width:100%;margin:5px 0;padding:10px;border:none;border-radius:8px
}
button{background:var(--blue);cursor:pointer}
nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
nav button{flex:1;background:none;color:#aaa}
.active{color:var(--blue)}
img{max-width:100%;border-radius:10px}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h2>ZAGEL</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="username" placeholder="Username">
<input type="file" id="avatar">
<button id="signup">إنشاء حساب</button>
<button id="login">دخول</button>
<button id="google">Google</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div id="feed" class="screen"></div>
<div id="chat" class="screen hidden"></div>
<div id="dm" class="screen hidden"></div>
<div id="profile" class="screen hidden"></div>

<nav>
<button data="feed" class="active">🏠</button>
<button data="chat">💬</button>
<button data="dm">📩</button>
<button data="profile">👤</button>
</nav>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,
GoogleAuthProvider,signInWithPopup,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,doc,setDoc,getDoc,collection,addDoc,
onSnapshot,updateDoc,arrayUnion,arrayRemove,serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getDatabase,ref,push,onChildAdded,set
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
authDomain:"fir-c3e88.firebaseapp.com",
projectId:"fir-c3e88",
databaseURL:"https://fir-c3e88-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();
const db=getFirestore();
const rtdb=getDatabase();

let userData;

/* ===== Cloudinary ===== */
async function upload(file){
const f=new FormData();
f.append("file",file);
f.append("upload_preset","j1a241e9_preset");

const res=await fetch("https://api.cloudinary.com/v1_1/j1a241e9/image/upload",{method:"POST",body:f});
const d=await res.json();
return d.secure_url+"?w=600&q=auto&f=auto";
}

/* ===== AUTH ===== */
signup.onclick=async()=>{
const u=await createUserWithEmailAndPassword(auth,email.value,pass.value);
let avatarUrl="";
if(avatar.files[0]) avatarUrl=await upload(avatar.files[0]);

await setDoc(doc(db,"users",u.user.uid),{
username:username.value,
avatar:avatarUrl,
followers:[],
following:[],
online:true
});
};

login.onclick=()=>signInWithEmailAndPassword(auth,email.value,pass.value);
google.onclick=()=>signInWithPopup(auth,new GoogleAuthProvider());

onAuthStateChanged(auth,async(u)=>{
if(u){
authUI(false);
const snap=await getDoc(doc(db,"users",u.uid));
userData=snap.data();

set(ref(rtdb,"status/"+u.uid),{online:true});

loadFeed();
loadChat();
loadDM();
loadProfile();
}
});

/* ===== FEED ===== */
function loadFeed(){
onSnapshot(collection(db,"posts"),snap=>{
feed.innerHTML=`
<textarea id="ptext"></textarea>
<input type="file" id="pimg">
<button onclick="createPost()">نشر</button>
`;

snap.forEach(d=>{
const p=d.data();
feed.innerHTML+=`
<div class="card">
<b>${p.username}</b>
<p>${p.text}</p>
${p.img?`<img loading="lazy" src="${p.img}">`:""}
<button onclick="like('${d.id}')">❤️ ${p.likes?.length||0}</button>
<button onclick="follow('${p.uid}')">Follow</button>
</div>
`;
});
});
}

window.createPost=async()=>{
let img="";
if(pimg.files[0]) img=await upload(pimg.files[0]);

await addDoc(collection(db,"posts"),{
text:ptext.value,
img,
uid:auth.currentUser.uid,
username:userData.username,
likes:[],
time:serverTimestamp()
});
};

window.like=async(id)=>{
await updateDoc(doc(db,"posts",id),{
likes:arrayUnion(auth.currentUser.uid)
});
};

window.follow=async(uid)=>{
await updateDoc(doc(db,"users",uid),{
followers:arrayUnion(auth.currentUser.uid)
});
};

/* ===== GLOBAL CHAT ===== */
function loadChat(){
onChildAdded(ref(rtdb,"global"),snap=>{
const m=snap.val();
chat.innerHTML+=`
<div class="card">
<b>${m.username}</b>
<p>${m.text}</p>
</div>`;
});
}

document.addEventListener("keydown",e=>{
if(e.key==="Enter"){
push(ref(rtdb,"global"),{
text:"رسالة",
username:userData.username
});
}
});

/* ===== DM ===== */
function loadDM(){
onChildAdded(ref(rtdb,"dm/"+auth.currentUser.uid),snap=>{
const m=snap.val();
dm.innerHTML+=`
<div class="card">
<p>${m.text}</p>
</div>`;
});
}

/* ===== PROFILE ===== */
function loadProfile(){
profile.innerHTML=`
<h2>${userData.username}</h2>
<img src="${userData.avatar}">
`;
}

/* ===== UI ===== */
function authUI(show){
document.getElementById("auth").classList.toggle("hidden",!show);
document.getElementById("app").classList.toggle("hidden",show);
}

document.querySelectorAll("nav button").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
document.getElementById(b.dataset).classList.remove("hidden");

document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
};
});

</script>
</body>
</html>
