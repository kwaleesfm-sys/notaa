<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAGEL | زاجل</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d0d12;
  --surface:#1a1a24;
  --blue:#00f3ff;
  --pink:#ff007c;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
  background:var(--bg);
  color:#fff;
  overflow:hidden;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  padding:15px;
  text-align:center;
  font-size:20px;
  color:var(--blue);
  border-bottom:1px solid #222;
}

.screen{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:none;
}

.active{display:block}

/* POST */
.post{
  background:var(--surface);
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

.post img{
  width:100%;
  border-radius:10px;
  margin-top:8px;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.like{
  color:var(--pink);
  cursor:pointer;
}

/* INPUT */
textarea,input{
  width:100%;
  background:#111;
  border:none;
  padding:10px;
  color:#fff;
  border-radius:8px;
  margin-top:5px;
}

/* CHAT */
.message{
  background:var(--surface);
  padding:8px;
  border-radius:10px;
  margin-bottom:6px;
}

.chat-box{
  display:flex;
  gap:5px;
  margin-top:10px;
}

/* NAV */
nav{
  display:flex;
  background:#111;
  border-top:1px solid #222;
}

nav button{
  flex:1;
  padding:10px;
  background:none;
  border:none;
  color:#aaa;
}

nav button.active{
  color:var(--blue);
}

/* BUTTON */
.btn{
  background:var(--blue);
  border:none;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  color:#000;
  cursor:pointer;
}

/* LOGIN */
.login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}
</style>
</head>

<body>

<div id="login" class="login">
  <h2>ZAGEL</h2>
  <button class="btn" id="loginBtn">تسجيل بجوجل</button>
</div>

<div class="app" id="app" style="display:none">

<header>زاجل</header>

<!-- FEED -->
<div id="feed" class="screen active">
  <textarea id="postText" placeholder="اكتب منشور..."></textarea>
  <input type="file" id="imageInput">
  <button class="btn" id="postBtn">نشر</button>

  <div id="posts"></div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <div id="messages"></div>

  <div class="chat-box">
    <input id="msgInput" placeholder="اكتب رسالة">
    <button class="btn" id="sendBtn">إرسال</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <h3 id="userName"></h3>
  <img id="userImg" width="80" style="border-radius:50%">
  <button class="btn" id="logout">تسجيل خروج</button>
</div>

<nav>
  <button data-tab="feed" class="active">🏠</button>
  <button data-tab="chat">💬</button>
  <button data-tab="profile">👤</button>
</nav>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
  authDomain: "fir-c3e88.firebaseapp.com",
  databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
  projectId: "fir-c3e88",
  storageBucket: "fir-c3e88.firebasestorage.app",
  messagingSenderId: "202130175288",
  appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const rtdb = getDatabase();

const provider = new GoogleAuthProvider();

let user;

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{
  try{
    await signInWithPopup(auth, provider);
  }catch(e){ alert("خطأ تسجيل الدخول"); }
};

onAuthStateChanged(auth, async(u)=>{
  if(u){
    user = u;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";

    document.getElementById("userName").innerText = u.displayName;
    document.getElementById("userImg").src = u.photoURL;

    await setDoc(doc(db,"users",u.uid),{
      name:u.displayName,
      photo:u.photoURL
    });

    loadPosts();
    loadChat();
  }
});

/* POST */
document.getElementById("postBtn").onclick = async ()=>{
  const text = postText.value;
  let imageUrl = "";

  if(imageInput.files[0]){
    const form = new FormData();
    form.append("file", imageInput.files[0]);
    form.append("upload_preset","j1a241e9_preset");

    const res = await fetch("https://api.cloudinary.com/v1_1/j1a241e9/image/upload",{method:"POST",body:form});
    const data = await res.json();
    imageUrl = data.secure_url + "?w=600&q=auto&f=auto";
  }

  await addDoc(collection(db,"posts"),{
    text,
    image:imageUrl,
    uid:user.uid,
    name:user.displayName,
    photo:user.photoURL,
    likes:[],
    created:serverTimestamp()
  });

  postText.value="";
};

/* LOAD POSTS */
function loadPosts(){
  const q = query(collection(db,"posts"), orderBy("created","desc"), limit(50));

  onSnapshot(q,(snap)=>{
    posts.innerHTML="";
    snap.forEach(docu=>{
      const d = docu.data();

      const liked = d.likes.includes(user.uid);

      posts.innerHTML += `
        <div class="post">
          <b>${d.name}</b>
          <p>${d.text}</p>
          ${d.image ? `<img loading="lazy" src="${d.image}">` : ""}

          <div class="actions">
            <span>${d.likes.length} ❤️</span>
            <span class="like" onclick="likePost('${docu.id}', ${liked})">
              ${liked ? "💔" : "❤️"}
            </span>
          </div>
        </div>
      `;
    });
  });
}

window.likePost = async(id,liked)=>{
  const refDoc = doc(db,"posts",id);
  await updateDoc(refDoc,{
    likes: liked ? arrayRemove(user.uid) : arrayUnion(user.uid)
  });
};

/* CHAT */
document.getElementById("sendBtn").onclick = ()=>{
  const text = msgInput.value;
  if(!text) return;

  push(ref(rtdb,"chat"),{
    text,
    name:user.displayName,
    photo:user.photoURL
  });

  msgInput.value="";
};

function loadChat(){
  onChildAdded(ref(rtdb,"chat"),(data)=>{
    const d = data.val();
    messages.innerHTML += `
      <div class="message">
        <b>${d.name}</b>
        <p>${d.text}</p>
      </div>
    `;
    messages.scrollTop = messages.scrollHeight;
  });
}

/* NAVIGATION */
document.querySelectorAll("nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(btn.dataset.tab).classList.add("active");

    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* LOGOUT */
logout.onclick = ()=> signOut(auth);

</script>
</body>
</html>
