<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAGEL V2 | زاجل المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0d0d12;
            --surface: #1a1a24;
            --accent-blue: #00f3ff;
            --accent-pink: #ff007c;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --font-family: 'Tajawal', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-family); background-color: var(--bg); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* الأنماط العامة */
        .hidden { display: none !important; }
        .neon-text-blue { text-shadow: 0 0 10px var(--accent-blue); color: var(--accent-blue); }
        .neon-text-pink { text-shadow: 0 0 10px var(--accent-pink); color: var(--accent-pink); }
        
        .btn { background: linear-gradient(45deg, var(--accent-blue), #007bb5); border: none; color: #000; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: var(--font-family); }
        .btn:active { transform: scale(0.95); }
        .btn-pink { background: linear-gradient(45deg, var(--accent-pink), #b50058); color: #fff; }

        input, textarea { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 10px; width: 100%; outline: none; font-family: var(--font-family); margin-bottom: 10px; }

        /* شريط التنقل */
        header { background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .main-content { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; transform: translateZ(0); }
        .tab-content { display: none; padding: 15px; animation: slideIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* شريط السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom, 10px); }
        .nav-item { color: var(--text-muted); font-size: 1.2rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item span { font-size: 0.6rem; margin-top: 3px; }
        .nav-item.active { color: var(--accent-blue); transform: translateY(-3px); }

        /* المنشورات */
        .post-card { background: var(--surface); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-blue); object-fit: cover; }
        .post-image { width: 100%; border-radius: 10px; margin: 10px 0; max-height: 350px; object-fit: cover; }
        .post-actions { display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .action-item { cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
        .action-item.active { color: var(--accent-pink); }

        /* المتابعة والمستخدمين */
        .user-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .follow-btn { padding: 5px 12px; font-size: 0.8rem; border-radius: 8px; border: 1px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; }
        .follow-btn.following { background: var(--accent-blue); color: #000; }

        /* الدردشة الخاصة */
        .chat-list-item { display: flex; align-items: center; gap: 12px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        #private-chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; }
        .chat-header { background: var(--surface); padding: 15px; display: flex; align-items: center; gap: 15px; }
        .messages-area { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; position: relative; }
        .msg-sent { align-self: flex-end; background: var(--accent-blue); color: #000; border-bottom-left-radius: 2px; }
        .msg-received { align-self: flex-start; background: var(--surface); color: #fff; border-bottom-right-radius: 2px; }

        /* التعليقات */
        .comments-section { margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; font-size: 0.85rem; }
        .comment-item { margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 3px; }
        .comment-user { font-weight: bold; color: var(--accent-blue); margin-left: 5px; }

        /* Modal */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; display:flex; align-items:center; justify-content:center; padding: 20px; }
        .loader { width: 30px; height: 30px; border: 3px solid var(--surface); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="auth-page" class="modal" style="background: var(--bg);">
        <div style="width: 100%; max-width: 350px; text-align: center;">
            <h1 class="neon-text-blue" style="font-size: 3rem; margin-bottom: 30px;">ZAGEL</h1>
            <div id="login-box">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
                <input type="password" id="password" placeholder="كلمة المرور">
                <button class="btn" id="btn-action" style="width: 100%;">دخول</button>
                <p id="switch-auth" style="margin-top: 15px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer;">ليس لديك حساب؟ <span class="neon-text-pink">سجل الآن</span></p>
            </div>
        </div>
    </div>

    <div id="app-page" class="hidden">
        <header>
            <div class="neon-text-blue" style="font-weight: 900; font-size: 1.4rem;">زاجل</div>
            <div id="current-user-name" style="font-size: 0.8rem; color: var(--accent-pink);"></div>
        </header>

        <div class="main-content">
            <div id="tab-home" class="tab-content active">
                <div style="background: var(--surface); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                    <textarea id="post-input" placeholder="ماذا يدور في ذهنك؟" rows="2" style="margin-bottom: 5px;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="img-input" style="cursor: pointer; color: var(--accent-blue); font-size: 1.2rem;"><i class="fa-regular fa-image"></i></label>
                        <input type="file" id="img-input" class="hidden" accept="image/*">
                        <button class="btn" id="btn-post">نشر</button>
                    </div>
                    <img id="img-preview" style="width: 100%; max-height: 150px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none;">
                </div>
                <div id="posts-container"></div>
            </div>

            <div id="tab-users" class="tab-content">
                <h3 style="margin-bottom: 15px;">اكتشف أشخاصاً</h3>
                <div id="users-container"></div>
            </div>

            <div id="tab-chats" class="tab-content">
                <h3 style="margin-bottom: 15px;">المحادثات</h3>
                <div id="chats-list-container"></div>
            </div>

            <div id="tab-profile" class="tab-content">
                <div style="text-align: center; padding: 20px; background: var(--surface); border-radius: 20px;">
                    <img src="" id="my-avatar" class="avatar" style="width: 80px; height: 80px; margin-bottom: 10px;">
                    <h2 id="my-name"></h2>
                    <div style="display: flex; justify-content: center; gap: 20px; margin: 15px 0;">
                        <div><b id="count-following">0</b><br><small>متابِع</small></div>
                        <div><b id="count-followers">0</b><br><small>متابعون</small></div>
                    </div>
                    <button class="btn btn-pink" id="btn-logout">تسجيل الخروج</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showTab('home')"><i class="fa-solid fa-house"></i><span>الرئيسية</span></div>
            <div class="nav-item" onclick="showTab('users')"><i class="fa-solid fa-user-plus"></i><span>اكتشاف</span></div>
            <div class="nav-item" onclick="showTab('chats')"><i class="fa-solid fa-message"></i><span>خاص</span></div>
            <div class="nav-item" onclick="showTab('profile')"><i class="fa-solid fa-user-gear"></i><span>حسابي</span></div>
        </nav>
    </div>

    <div id="private-chat-window" class="hidden">
        <div class="chat-header">
            <i class="fa-solid fa-arrow-right" onclick="closePrivateChat()" style="cursor: pointer;"></i>
            <img src="" id="chat-user-avatar" class="avatar" style="width: 35px; height: 35px;">
            <div id="chat-user-name" style="font-weight: bold;"></div>
        </div>
        <div class="messages-area" id="private-msgs"></div>
        <div style="padding: 10px; background: var(--surface); display: flex; gap: 10px;">
            <input type="text" id="private-input" placeholder="اكتب رسالة..." style="margin-bottom: 0;">
            <button class="btn" id="btn-send-private"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, limit, updateDoc, arrayUnion, arrayRemove, serverTimestamp, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp as rtdbTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        let me = null;
        let isRegister = false;
        let selectedBase64 = "";

        // --- التوثيق ---
        document.getElementById('switch-auth').onclick = () => {
            isRegister = !isRegister;
            document.getElementById('btn-action').innerText = isRegister ? 'إنشاء حساب' : 'دخول';
            document.getElementById('switch-auth').innerHTML = isRegister ? 'لديك حساب؟ <span>سجل دخول</span>' : 'ليس لديك حساب؟ <span>سجل الآن</span>';
        };

        document.getElementById('btn-action').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("املاً البيانات");

            try {
                if(isRegister) {
                    const name = prompt("ما اسمك؟");
                    if(!name) return;
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(res.user, { displayName: name });
                    await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, name: name, email: email, following: [], followers: [] });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                me = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('app-page').classList.remove('hidden');
                document.getElementById('current-user-name').innerText = user.displayName;
                document.getElementById('my-name').innerText = user.displayName;
                document.getElementById('my-avatar').src = `https://ui-avatars.com/api/?name=${user.displayName}&background=00f3ff&color=000`;
                loadHome();
                loadUsers();
                loadMyStats();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('app-page').classList.add('hidden');
            }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // --- المتابعة والإحصائيات ---
        async function loadMyStats() {
            const docRef = doc(db, "users", me.uid);
            onSnapshot(docRef, (d) => {
                const data = d.data();
                document.getElementById('count-following').innerText = data.following?.length || 0;
                document.getElementById('count-followers').innerText = data.followers?.length || 0;
            });
        }

        async function toggleFollow(targetUid, btn) {
            const myRef = doc(db, "users", me.uid);
            const targetRef = doc(db, "users", targetUid);
            const isFollowing = btn.classList.contains('following');

            if(isFollowing) {
                await updateDoc(myRef, { following: arrayRemove(targetUid) });
                await updateDoc(targetRef, { followers: arrayRemove(me.uid) });
                btn.classList.remove('following'); btn.innerText = "متابعة";
            } else {
                await updateDoc(myRef, { following: arrayUnion(targetUid) });
                await updateDoc(targetRef, { followers: arrayUnion(me.uid) });
                btn.classList.add('following'); btn.innerText = "متابع ✅";
            }
        }

        // --- المنشورات (Base64) ---
        document.getElementById('img-input').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                selectedBase64 = reader.result;
                document.getElementById('img-preview').src = selectedBase64;
                document.getElementById('img-preview').style.display = 'block';
            };
            if(file) reader.readAsDataURL(file);
        };

        document.getElementById('btn-post').onclick = async () => {
            const text = document.getElementById('post-input').value;
            if(!text && !selectedBase64) return;
            
            await addDoc(collection(db, "posts"), {
                uid: me.uid, name: me.displayName, text, image: selectedBase64,
                likes: [], createdAt: serverTimestamp()
            });
            
            document.getElementById('post-input').value = "";
            document.getElementById('img-preview').style.display = "none";
            selectedBase64 = "";
        };

        function loadHome() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    const post = d.data();
                    const isLiked = post.likes.includes(me.uid);
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="https://ui-avatars.com/api/?name=${post.name}" class="avatar">
                            <b>${post.name}</b>
                        </div>
                        <p>${post.text}</p>
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                        <div class="post-actions">
                            <div class="action-item ${isLiked?'active':''}" onclick="likePost('${d.id}', ${isLiked})">
                                <i class="fa-${isLiked?'solid':'regular'} fa-heart"></i> ${post.likes.length}
                            </div>
                            <div class="action-item" onclick="toggleComments('${d.id}')">
                                <i class="fa-regular fa-comment"></i> تعليق
                            </div>
                        </div>
                        <div id="comm-box-${d.id}" class="hidden">
                            <div class="comments-section" id="list-${d.id}"></div>
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <input type="text" id="in-${d.id}" placeholder="اكتب تعليقاً..." style="margin-bottom:0; padding:5px;">
                                <button class="btn" onclick="addComment('${d.id}')" style="padding:5px 10px;">إرسال</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                    loadComments(d.id);
                });
            });
        }

        window.likePost = async (id, isLiked) => {
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { likes: isLiked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
        };

        window.toggleComments = (id) => document.getElementById(`comm-box-${id}`).classList.toggle('hidden');

        window.addComment = async (id) => {
            const inp = document.getElementById(`in-${id}`);
            if(!inp.value) return;
            await addDoc(collection(db, `posts/${id}/comments`), {
                uid: me.uid, name: me.displayName, text: inp.value, createdAt: serverTimestamp()
            });
            inp.value = "";
        };

        function loadComments(postId) {
            const q = query(collection(db, `posts/${postId}/comments`), orderBy("createdAt", "asc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById(`list-${postId}`);
                list.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    list.innerHTML += `<div class="comment-item"><span class="comment-user">${c.name}:</span>${c.text}</div>`;
                });
            });
        }

        // --- اكتشاف المستخدمين ---
        async function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const container = document.getElementById('users-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    if(d.id === me.uid) return;
                    const u = d.data();
                    const isFollowing = u.followers?.includes(me.uid);
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="https://ui-avatars.com/api/?name=${u.name}" class="avatar" style="width:30px; height:30px;">
                            <span>${u.name}</span>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-pink" onclick="startPrivateChat('${u.uid}', '${u.name}')" style="padding:5px 10px;"><i class="fa-solid fa-envelope"></i></button>
                            <button class="follow-btn ${isFollowing?'following':''}" id="f-${u.uid}">${isFollowing?'متابع ✅':'متابعة'}</button>
                        </div>
                    `;
                    container.appendChild(row);
                    document.getElementById(`f-${u.uid}`).onclick = (e) => toggleFollow(u.uid, e.target);
                });
            });
        }

        // --- الدردشة الخاصة السريعة ---
        let activeChatId = null;
        window.startPrivateChat = (targetUid, targetName) => {
            const chatId = me.uid < targetUid ? `${me.uid}_${targetUid}` : `${targetUid}_${me.uid}`;
            activeChatId = chatId;
            
            document.getElementById('chat-user-name').innerText = targetName;
            document.getElementById('chat-user-avatar').src = `https://ui-avatars.com/api/?name=${targetName}`;
            document.getElementById('private-msgs').innerHTML = "";
            document.getElementById('private-chat-window').classList.remove('hidden');

            const chatRef = ref(rtdb, `privates/${chatId}`);
            // إزالة المستمعات القديمة لتجنب التكرار
            onChildAdded(chatRef, (snap) => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${m.sender === me.uid ? 'msg-sent' : 'msg-received'}`;
                div.innerText = m.text;
                document.getElementById('private-msgs').appendChild(div);
                document.getElementById('private-msgs').scrollTop = document.getElementById('private-msgs').scrollHeight;
            }, { onlyOnce: false });
        };

        window.closePrivateChat = () => document.getElementById('private-chat-window').classList.add('hidden');

        document.getElementById('btn-send-private').onclick = async () => {
            const inp = document.getElementById('private-input');
            if(!inp.value || !activeChatId) return;
            await push(ref(rtdb, `privates/${activeChatId}`), {
                sender: me.uid, text: inp.value, time: rtdbTimestamp()
            });
            inp.value = "";
        };

        // --- تبديل الصفحات ---
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');
        };

    </script>
</body>
</html>
