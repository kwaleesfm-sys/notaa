<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NootaChat Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ================= المتغيرات والهوية البصرية ================= */
        :root {
            --bg-color: #0f172a; --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6; --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #0ea5e9; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color), #020617);
            color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .hidden { display: none !important; }

        /* ================= تأثيرات الزجاج والأزرار ================= */
        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }
        .rounded-box { border-radius: 24px; }
        
        button { cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; }
        button:active { transform: scale(0.95); }
        
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 14px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 16px; box-shadow: 0 4px 20px var(--primary-glow); }
        .input-main { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 14px; border-radius: 16px; color: white; width: 100%; margin-bottom: 15px; text-align: center; transition: 0.3s; }
        .input-main:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        /* ================= شاشات التطبيق ================= */
        .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 2000; padding: 20px; }
        .modal-content { width: 100%; max-width: 400px; padding: 30px; text-align: center; }

        #app-container { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        .header-title { padding: 25px 20px 10px; font-size: 28px; font-weight: 900; background: -webkit-linear-gradient(var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* قائمة الأصدقاء */
        #friends-list { padding: 10px 20px; overflow-y: auto; flex: 1; padding-bottom: 90px; }
        .friend-card { display: flex; align-items: center; padding: 15px; margin-bottom: 12px; transition: 0.3s; cursor: pointer; }
        .friend-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .f-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        
        /* شريط التنقل */
        .nav-bar { position: absolute; bottom: 20px; left: 20px; right: 20px; height: 70px; display: flex; align-items: center; justify-content: space-around; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .nav-btn { font-size: 24px; color: var(--text-muted); padding: 10px; opacity: 0.6; }
        .nav-btn.active { color: var(--primary); opacity: 1; filter: drop-shadow(0 0 8px var(--primary)); transform: translateY(-3px); }

        /* ================= نافذة المحادثة ================= */
        #chat-screen { position: fixed; inset: 0; background: var(--bg-color); z-index: 500; display: flex; flex-direction: column; }
        
        .chat-header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 10; }
        .back-btn { font-size: 24px; color: white; background: none; margin-left: 15px; }
        
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        /* رسائل بهوية جديدة */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-me { align-self: flex-end; }
        .msg-them { align-self: flex-start; }
        
        .msg-bubble { padding: 12px 16px; font-size: 15px; line-height: 1.5; word-wrap: break-word; position: relative; user-select: none; }
        .msg-me .msg-bubble { background: linear-gradient(135deg, var(--primary), #7c3aed); border-radius: 20px 20px 4px 20px; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .msg-them .msg-bubble { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px 20px 20px 4px; }
        
        /* تأثير وضع الشبح */
        .msg-ghost { background: transparent !important; border: 1px dashed var(--accent) !important; color: var(--accent); animation: pulseGhost 2s infinite; }
        @keyframes pulseGhost { 0% { opacity: 0.8; } 50% { opacity: 0.4; box-shadow: 0 0 10px var(--accent); } 100% { opacity: 0.8; } }

        .msg-img { max-width: 100%; border-radius: 12px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .react-badge { position: absolute; bottom: -10px; right: 10px; background: #1e293b; border: 1px solid var(--primary); border-radius: 50%; padding: 4px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* منطقة الإدخال */
        .chat-input-area { padding: 15px; background: rgba(15, 23, 42, 0.9); border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 10px; z-index: 10; padding-bottom: env(safe-area-inset-bottom, 15px); }
        
        .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px 20px; color: white; font-size: 15px; transition: 0.3s; }
        .chat-input:focus { background: rgba(255,255,255,0.1); border-color: var(--primary); }
        
        .tool-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; transition: 0.3s; }
        .send-btn { background: var(--primary); border: none; box-shadow: 0 0 15px var(--primary-glow); }
        .tool-btn.active { background: var(--danger); border-color: var(--danger); }

    </style>
</head>
<body>

    <div id="auth-screen" class="modal">
        <div class="glass rounded-box modal-content">
            <h1 style="color:var(--primary); font-size: 38px; margin-bottom: 5px; font-weight: 900;">Noota<span style="color:var(--accent)">Chat</span></h1>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 14px;">الجيل الجديد من المراسلة</p>
            <input type="email" id="email" class="input-main" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" class="input-main" placeholder="كلمة المرور">
            <button class="btn-main" onclick="authAction('login')">تسجيل الدخول</button>
            <p onclick="document.getElementById('signup-section').classList.remove('hidden')" style="margin-top: 20px; color: var(--accent); cursor: pointer; font-size: 14px;">ليس لديك حساب؟ إنشاء جديد</p>
            
            <div id="signup-section" class="hidden" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border);">
                <input type="text" id="new-name" class="input-main" placeholder="اسمك (يظهر للأصدقاء)">
                <button class="btn-main" style="background: linear-gradient(135deg, #10b981, #059669);" onclick="authAction('signup')">إنشاء حساب جديد</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div class="header-title">محادثاتي</div>
        
        <div id="friends-list">
            </div>

        <div style="padding: 0 20px;">
            <button class="glass rounded-box" style="width: 100%; padding: 15px; color: var(--primary); font-weight: bold; border-color: var(--primary);" onclick="addNewFriend()">+ بدء محادثة جديدة</button>
        </div>

        <div class="glass nav-bar">
            <div class="nav-btn active">💬</div>
            <div class="nav-btn" onclick="logout()">🚪</div>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="back-btn" onclick="closeChat()">➔</button>
                <img id="active-f-img" src="" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover;">
                <div>
                    <div id="active-f-name" style="font-weight: bold; font-size: 16px;">...</div>
                    <div id="chat-mode-text" style="font-size: 12px; color: var(--accent);">محادثة آمنة</div>
                </div>
            </div>
            <div>
                <button id="btn-ghost" class="tool-btn" style="width: 35px; height: 35px; font-size: 16px;" onclick="toggleGhost()">👻</button>
            </div>
        </div>

        <div class="messages-container" id="messages-container">
            </div>

        <div class="chat-input-area">
            <label class="tool-btn" style="cursor: pointer;">
                📸<input type="file" id="img-input" accept="image/*" hidden onchange="sendImage(event)">
            </label>
            <input type="text" id="msg-input" class="chat-input" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button class="tool-btn send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script type="module">
        // استيراد المكتبات بشكل صحيح للإصدار 10
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, child, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // بيانات الربط (يجب أن تتأكد من قواعد الحماية في Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // متغيرات النظام
        let myData = null;
        let activeChatId = null;
        let activeFriendId = null;
        let unsubscribeChat = null; // **هذا هو سر الحل السحري لمنع التداخل**
        let isGhostMode = false;

        // ================= 1. نظام الدخول والتسجيل =================
        window.authAction = async (type) => {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value.trim();
            
            if (!e || !p) return alert("يرجى إدخال البريد وكلمة المرور");

            try {
                if (type === 'login') {
                    await signInWithEmailAndPassword(auth, e, p);
                } else {
                    const n = document.getElementById('new-name').value.trim();
                    if (!n) return alert("يرجى إدخال اسمك");
                    
                    const res = await createUserWithEmailAndPassword(auth, e, p);
                    // حفظ بيانات المستخدم الجديد
                    const username = e.split('@')[0].toLowerCase();
                    await set(ref(db, 'users/' + res.user.uid), { 
                        name: n, 
                        username: username, 
                        img: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' 
                    });
                    // لسهولة البحث عنه لاحقاً
                    await set(ref(db, 'search_users/' + username), res.user.uid);
                }
            } catch (error) {
                alert("حدث خطأ: تأكد من صحة البيانات أو أن البريد غير مستخدم مسبقاً.");
                console.error(error);
            }
        };

        window.logout = () => { signOut(auth).then(() => location.reload()); };

        // مراقبة حالة الدخول
        onAuthStateChanged(auth, async user => {
            if (user) {
                const snap = await get(child(ref(db), 'users/' + user.uid));
                if (snap.exists()) {
                    myData = snap.val();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    loadFriendsList();
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        // ================= 2. الشاشة الرئيسية والأصدقاء =================
        function loadFriendsList() {
            onValue(ref(db, `friends/${auth.currentUser.uid}`), snap => {
                const list = document.getElementById('friends-list');
                list.innerHTML = "";
                
                if(!snap.exists()) {
                    list.innerHTML = "<p style='text-align:center; color:var(--text-muted); margin-top:20px;'>لا يوجد محادثات بعد.</p>";
                    return;
                }

                snap.forEach(child => {
                    const f = child.val();
                    const fid = child.key;
                    const card = document.createElement('div');
                    card.className = 'glass rounded-box friend-card';
                    card.onclick = () => openChat(fid, f.name, f.img);
                    card.innerHTML = `
                        <img src="${f.img}" class="f-avatar">
                        <div style="margin-right: 15px;">
                            <h3 style="font-size: 16px;">${f.name}</h3>
                            <span style="font-size: 12px; color: var(--text-muted);">انقر لفتح المحادثة</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        window.addNewFriend = async () => {
            const un = prompt("أدخل 'اسم المستخدم' (الجزء الأول من إيميل صديقك):")?.toLowerCase();
            if (!un) return;

            const snap = await get(child(ref(db), 'search_users/' + un));
            if (snap.exists() && snap.val() !== auth.currentUser.uid) {
                const fid = snap.val();
                const fData = (await get(child(ref(db), 'users/' + fid))).val();
                openChat(fid, fData.name, fData.img);
            } else {
                alert("المستخدم غير موجود أو أنك تحاول إضافة نفسك!");
            }
        };

        // ================= 3. نظام المحادثة الذكي (بدون أخطاء) =================
        window.openChat = async (friendId, friendName, friendImg) => {
            // 🔴 أهم سطر: قتل الاتصال القديم قبل فتح الجديد
            if (unsubscribeChat) {
                unsubscribeChat();
                unsubscribeChat = null;
            }

            activeFriendId = friendId;
            activeChatId = [auth.currentUser.uid, friendId].sort().join("_");
            
            // تجهيز الواجهة
            document.getElementById('messages-container').innerHTML = ""; // تنظيف الشاشة
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('active-f-name').innerText = friendName;
            document.getElementById('active-f-img').src = friendImg;
            document.getElementById('chat-mode-text').innerText = isGhostMode ? "👻 وضع الشبح مفعل" : "محادثة آمنة";

            // حفظ الصديق في القائمة للطرفين
            await update(ref(db, `friends/${auth.currentUser.uid}/${friendId}`), { name: friendName, img: friendImg });
            await update(ref(db, `friends/${friendId}/${auth.currentUser.uid}`), { name: myData.name, img: myData.img });

            // 🟢 بدء الاستماع للرسائل بشكل نظيف
            const messagesRef = ref(db, 'messages/' + activeChatId);
            unsubscribeChat = onValue(messagesRef, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = ""; // تحديث الشاشة

                if (snapshot.exists()) {
                    snapshot.forEach((childSnap) => {
                        const msg = childSnap.val();
                        const msgId = childSnap.key;
                        renderMessage(msgId, msg, container);
                    });
                    container.scrollTop = container.scrollHeight; // النزول لآخر رسالة
                }
            });
        };

        window.closeChat = () => {
            if (unsubscribeChat) unsubscribeChat(); // إيقاف الاستهلاك عند الخروج
            document.getElementById('chat-screen').classList.add('hidden');
        };

        // ================= 4. إرسال وعرض الرسائل (بالمميزات الجديدة) =================
        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            const msgData = {
                sender: auth.currentUser.uid,
                text: text,
                time: Date.now(),
                ghost: isGhostMode
            };

            const newMsgRef = push(ref(db, 'messages/' + activeChatId));
            set(newMsgRef, msgData);
            
            input.value = "";

            // تدمير ذاتي إذا كان شبح
            if (isGhostMode) setTimeout(() => remove(newMsgRef), 10000);
        };

        window.sendImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const newMsgRef = push(ref(db, 'messages/' + activeChatId));
                set(newMsgRef, {
                    sender: auth.currentUser.uid,
                    img: reader.result,
                    time: Date.now(),
                    ghost: isGhostMode
                });
                if (isGhostMode) setTimeout(() => remove(newMsgRef), 10000);
            };
            e.target.value = ''; // تصفير الإدخال
        };

        function renderMessage(msgId, msg, container) {
            const isMe = msg.sender === auth.currentUser.uid;
            const div = document.createElement('div');
            div.className = `msg-wrapper ${isMe ? 'msg-me' : 'msg-them'}`;
            
            let bubbleClass = `glass msg-bubble ${msg.ghost ? 'msg-ghost' : ''}`;
            
            let contentHtml = "";
            if (msg.text) contentHtml += `<span>${msg.text}</span>`;
            if (msg.img) contentHtml += `<img src="${msg.img}" class="msg-img">`;
            if (msg.react) contentHtml += `<div class="react-badge">${msg.react}</div>`;

            div.innerHTML = `<div class="${bubbleClass}" ondblclick="addReact('${msgId}')">${contentHtml}</div>`;
            container.appendChild(div);
        }

        // ================= 5. المميزات الخاصة =================
        window.toggleGhost = () => {
            isGhostMode = !isGhostMode;
            document.getElementById('btn-ghost').classList.toggle('active', isGhostMode);
            document.getElementById('chat-mode-text').innerText = isGhostMode ? "👻 وضع الشبح مفعل (10 ثوان)" : "محادثة آمنة";
            document.getElementById('chat-mode-text').style.color = isGhostMode ? var(--danger) : var(--accent);
        };

        window.addReact = (msgId) => {
            // ميزة النقر المزدوج لإعطاء قلب
            update(ref(db, `messages/${activeChatId}/${msgId}`), { react: '❤️' });
        };
    </script>
</body>
</html>
