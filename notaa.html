<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NootaChat V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14; --glass: rgba(23, 28, 38, 0.8);
            --primary: #8b5cf6; --accent: #0ea5e9; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; color: #fff; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }

        /* الشاشات الرئيسية */
        .page { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .active-page { z-index: 20; }

        /* الهيدر */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--glass); backdrop-filter: blur(10px); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* القائمة السفلية */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--glass); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-btn { cursor: pointer; opacity: 0.5; transition: 0.3s; text-align: center; }
        .nav-btn.active { opacity: 1; color: var(--primary); transform: translateY(-5px); }

        /* منطقة المحادثات */
        .list-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .item-card { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        .item-card:active { border-color: var(--primary); background: rgba(139, 92, 246, 0.1); }

        /* شاشة الشات */
        #chat-view { z-index: 200; transform: translateX(100%); transition: 0.3s ease-out; }
        #chat-view.open { transform: translateX(0); }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; position: relative; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #262d3b; border-bottom-left-radius: 4px; }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* شريط الإدخال */
        .input-bar { padding: 15px; background: #1a202c; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; background: #0f172a; border: 1px solid var(--border); padding: 12px 20px; border-radius: 25px; color: #fff; }
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        /* شاشة الحساب */
        .profile-view { align-items: center; padding-top: 50px; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="auth-page" class="page active-page" style="justify-content: center; align-items: center; padding: 20px;">
        <h1 style="font-size: 40px; margin-bottom: 10px; color: var(--primary);">NootaChat</h1>
        <input type="email" id="email" placeholder="البريد الإلكتروني" style="width: 100%; max-width: 300px; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: #1a202c;">
        <input type="password" id="pass" placeholder="كلمة المرور" style="width: 100%; max-width: 300px; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid var(--border); background: #1a202c;">
        <button onclick="authAction()" style="width: 100%; max-width: 300px; padding: 15px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold;">دخول / تسجيل</button>
    </div>

    <div id="home-page" class="page hidden">
        <header>
            <h2 style="font-weight: 900;">الدردشات</h2>
            <img id="my-avatar-top" src="" class="avatar">
        </header>
        <div class="list-container" id="chats-list"></div>
        <button onclick="addNewChat()" style="position: fixed; bottom: 90px; left: 20px; background: var(--primary); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">+</button>
    </div>

    <div id="profile-page" class="page hidden profile-view">
        <img id="my-avatar-big" src="" class="profile-img">
        <h2 id="my-name-big">...</h2>
        <p id="my-user-big" style="color: var(--accent); margin-bottom: 30px;"></p>
        <button onclick="location.reload()" style="padding: 10px 30px; background: #ef4444; border: none; border-radius: 10px; font-weight: bold;">تسجيل الخروج</button>
    </div>

    <div id="chat-view" class="page hidden">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="closeChat()" style="background: none; border: none; font-size: 24px;">➔</button>
                <img id="chat-h-img" src="" class="avatar">
                <b id="chat-h-name">...</b>
            </div>
        </header>
        <div class="msg-box" id="msg-box"></div>
        <div class="input-bar">
            <label style="font-size: 24px; cursor: pointer;">🖼️<input type="file" hidden onchange="uploadImg(event)"></label>
            <input type="text" id="msg-input" placeholder="اكتب شيئاً..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">➔</button>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden">
        <div class="nav-btn active" id="btn-home" onclick="showPage('home')">💬<br><small>دردشة</small></div>
        <div class="nav-btn" id="btn-profile" onclick="showPage('profile')">👤<br><small>حسابي</small></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, child, update, off, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let me = null, activeC = null, chatUnsub = null;

        // 1. الدخول
        window.authAction = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch {
                try {
                    const res = await createUserWithEmailAndPassword(auth, e, p);
                    const uid = res.user.uid;
                    const userData = { n: e.split('@')[0], u: e.split('@')[0], img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}` };
                    await set(ref(db, 'users/' + uid), userData);
                    await set(ref(db, 'usernames/' + userData.u.toLowerCase()), uid);
                } catch (err) { alert(err.message); }
            }
        };

        onAuthStateChanged(auth, async u => {
            if(u) {
                const s = await get(child(ref(db), 'users/'+u.uid));
                if(s.exists()) {
                    me = s.val();
                    document.getElementById('auth-page').classList.add('hidden');
                    document.getElementById('home-page').classList.remove('hidden');
                    document.getElementById('bottom-nav').classList.remove('hidden');
                    updateProfileUI();
                    loadChats();
                }
            }
        });

        // 2. التنقل بين الصفحات
        window.showPage = (p) => {
            document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(p === 'home') {
                document.getElementById('home-page').classList.remove('hidden');
                document.getElementById('btn-home').classList.add('active');
            } else {
                document.getElementById('profile-page').classList.remove('hidden');
                document.getElementById('btn-profile').classList.add('active');
            }
        };

        function updateProfileUI() {
            document.getElementById('my-avatar-top').src = me.img;
            document.getElementById('my-avatar-big').src = me.img;
            document.getElementById('my-name-big').innerText = me.n;
            document.getElementById('my-user-big').innerText = "@" + me.u;
        }

        // 3. الدردشات
        function loadChats() {
            onValue(ref(db, `friends/${auth.currentUser.uid}`), snap => {
                const list = document.getElementById('chats-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const f = c.val();
                    const d = document.createElement('div');
                    d.className = 'item-card';
                    d.onclick = () => openChat(c.key, f.n, f.img);
                    d.innerHTML = `<img src="${f.img}" class="avatar" style="margin-left:15px;"><div><b>${f.n}</b><br><small style="opacity:0.6;">انقر للمراسلة</small></div>`;
                    list.appendChild(d);
                });
            });
        }

        window.addNewChat = async () => {
            const u = prompt("أدخل اسم المستخدم للصديق:");
            if(!u) return;
            const s = await get(child(ref(db), 'usernames/'+u.toLowerCase()));
            if(s.exists()) {
                const fData = (await get(child(ref(db), 'users/'+s.val()))).val();
                openChat(s.val(), fData.n, fData.img);
            } else alert("المستخدم غير موجود");
        };

        // 4. الشات (معدل ليكون سريعاً وبدون أخطاء)
        window.openChat = (id, name, img) => {
            if(chatUnsub) off(ref(db, 'messages/' + activeC));
            activeC = [auth.currentUser.uid, id].sort().join("_");
            
            const view = document.getElementById('chat-view');
            view.classList.remove('hidden');
            setTimeout(() => view.classList.add('open'), 10);
            
            document.getElementById('chat-h-name').innerText = name;
            document.getElementById('chat-h-img').src = img;
            document.getElementById('msg-box').innerHTML = "";

            update(ref(db, `friends/${auth.currentUser.uid}/${id}`), { n: name, img: img });
            update(ref(db, `friends/${id}/${auth.currentUser.uid}`), { n: me.n, img: me.img });

            const q = query(ref(db, 'messages/' + activeC), limitToLast(50));
            onValue(q, snap => {
                const box = document.getElementById('msg-box');
                box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const d = document.createElement('div');
                    d.className = `msg ${m.s === auth.currentUser.uid ? 'me' : 'them'}`;
                    if(m.t) d.innerText = m.t;
                    if(m.img) d.innerHTML = `<img src="${m.img}" class="msg-img">`;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.closeChat = () => {
            const view = document.getElementById('chat-view');
            view.classList.remove('open');
            setTimeout(() => view.classList.add('hidden'), 300);
        };

        window.sendMsg = () => {
            const val = document.getElementById('msg-input').value;
            if(!val.trim()) return;
            push(ref(db, 'messages/' + activeC), { s: auth.currentUser.uid, t: val, time: Date.now() });
            document.getElementById('msg-input').value = "";
        };

        window.uploadImg = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                push(ref(db, 'messages/' + activeC), { s: auth.currentUser.uid, img: reader.result, time: Date.now() });
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
