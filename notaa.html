<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NootaChat Ultra Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a29bfe; --primary-dark: #6c5ce7;
            --danger: #ff7675; --ghost: #00cec9; --whisper: #fdcb6e; --success: #00e676;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: linear-gradient(135deg, #090a0f, #1b1625, #0f172a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .hidden { display: none !important; }
        
        /* الأزرار والمدخلات */
        .btn-glass { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; padding: 16px; border-radius: 16px; color: white; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }
        .btn-glass:active { transform: scale(0.97); }
        .input-glass { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px; color: white; width: 100%; text-align: center; margin-bottom: 15px; transition: 0.3s; }
        
        /* شريط التنقل والنوتس */
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; display: flex; z-index: 100; padding: 10px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); font-weight: bold; text-shadow: 0 0 10px var(--primary); transform: translateY(-3px); }
        .notes-bar { display: flex; gap: 15px; padding: 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--glass-border); }
        .note-wrap { min-width: 70px; text-align: center; position: relative; cursor: pointer; }
        .note-img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; object-fit: cover; }
        .note-pop { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }

        /* منطقة الشات والمؤشرات الجديدة */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(25px); z-index: 300; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 78%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; transition: 0.2s; }
        .sent { align-self: flex-end; background: var(--primary-dark); border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2); }
        .received { align-self: flex-start; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        .whisper-msg { filter: blur(5px); opacity: 0.7; transition: 0.3s; border: 1px dashed var(--whisper); }
        .whisper-msg:hover, .whisper-msg:active { filter: blur(0); opacity: 1; }
        .ghost-msg { border: 1px dashed var(--ghost); background: rgba(0, 206, 201, 0.1) !important; color: var(--ghost); }
        
        .msg-status-icon { font-size: 11px; opacity: 0.7; margin-top: 5px; text-align: right; display: block; }
        .status-seen { color: #fff; text-shadow: 0 0 5px var(--primary); font-weight: bold; }

        .unread-badge { background: var(--danger); color: white; font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 12px; margin-left: auto; box-shadow: 0 0 10px var(--danger); }
        .online-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--success); margin-right: 5px; }
        .offline-dot { width: 10px; height: 10px; background: #666; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .input-area { padding: 15px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 10px; }
        .action-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 20px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .action-btn.recording { background: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 10px var(--danger); } 100% { transform: scale(1); } }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        audio { height: 40px; max-width: 200px; outline: none; border-radius: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-screen" class="modal">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h1 style="color:var(--primary); font-size: 35px; margin-bottom: 5px;">NootaChat</h1>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 30px; font-size: 14px;">الإصدار الألترا</p>
            <input type="email" id="email" class="input-glass" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" class="input-glass" placeholder="كلمة المرور">
            <button class="btn-glass" onclick="authAction('login')">دخول</button>
            <p onclick="document.getElementById('signup-modal').classList.remove('hidden')" style="margin-top: 20px; font-size: 13px; color: var(--primary); cursor: pointer;">إنشاء حساب جديد</p>
        </div>
    </div>

    <div id="signup-modal" class="modal hidden">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h2 style="margin-bottom: 20px;">تسجيل جديد</h2>
            <input type="email" id="s-email" class="input-glass" placeholder="بريد إلكتروني صالح">
            <input type="password" id="s-pass" class="input-glass" placeholder="كلمة مرور قوية">
            <button class="btn-glass" onclick="authAction('signup')">إنشاء الحساب</button>
            <p onclick="document.getElementById('signup-modal').classList.add('hidden')" style="margin-top: 15px; color: #ccc; cursor: pointer;">إلغاء</p>
        </div>
    </div>

    <div id="setup-screen" class="modal hidden">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h2 id="setup-title" style="margin-bottom: 20px;">هويتك الرقمية</h2>
            <div style="position:relative; width:110px; height:110px; margin:0 auto 20px;">
                <img id="prev-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100%; height:100%; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                <input type="file" id="img-input" accept="image/*" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
                <div style="position:absolute; bottom:0; right:0; background:var(--primary); width:30px; height:30px; border-radius:50%; line-height:30px;">📷</div>
            </div>
            <input type="text" id="set-user" class="input-glass" placeholder="Username (للبحث عنك)">
            <input type="text" id="set-nick" class="input-glass" placeholder="اللقب الظاهر للأصدقاء">
            <button class="btn-glass" onclick="saveUser()">حفظ</button>
            <p id="close-setup-btn" onclick="document.getElementById('setup-screen').classList.add('hidden')" class="hidden" style="margin-top:15px; color:#ccc;">إغلاق</p>
        </div>
    </div>

    <div id="app-screen" class="hidden" style="height:100%; display:flex; flex-direction:column;">
        <div id="page-chats" style="flex:1; overflow-y:auto; padding-bottom:100px;">
            <div style="padding: 25px 20px 10px; font-size: 28px; font-weight: 800;">الدردشات</div>
            <div class="notes-bar" id="notes-list">
                <div class="note-wrap" onclick="addNote()">
                    <div class="note-img" style="border: 2px dashed rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; font-size:25px; color:rgba(255,255,255,0.6);">+</div>
                    <span style="font-size:11px; margin-top:5px; display:block;">حالة جديدة</span>
                </div>
            </div>
            <div id="chat-items-list" style="padding: 10px;"></div>
            <button class="btn-glass" style="width: calc(100% - 40px); margin: 20px; box-shadow: none;" onclick="findFriend()">+ إضافة صديق (Username)</button>
        </div>

        <div id="page-profile" class="hidden" style="flex:1; padding:50px 20px; text-align:center;">
            <div class="glass-panel" style="padding: 40px 20px;">
                <img id="my-avatar" src="" style="width:140px; height:140px; border-radius:50%; border:4px solid var(--primary); object-fit:cover; margin-bottom: 15px;">
                <h2 id="my-name-display" style="margin-bottom: 5px;">...</h2>
                <p id="my-user-display" style="color:rgba(255,255,255,0.5); margin-bottom: 30px;">@...</p>
                <button class="btn-glass" style="background: rgba(255,255,255,0.1); margin-bottom: 15px;" onclick="editProfile()">تعديل البروفايل</button>
                <button class="btn-glass" style="background: var(--danger);" onclick="location.reload()">تسجيل خروج</button>
            </div>
        </div>

        <div class="glass-panel bottom-nav">
            <div class="nav-item active" onclick="tab('chats', this)"><span style="font-size:22px; margin-bottom:4px;">💬</span>دردشة</div>
            <div class="nav-item" onclick="tab('profile', this)"><span style="font-size:22px; margin-bottom:4px;">👤</span>حسابي</div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:22px;">➔</button>
                <img id="h-img" src="" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                <div onclick="openOptions()">
                    <b id="h-name" style="font-size: 16px; display:flex; align-items:center;">... <span id="h-online" class="offline-dot"></span></b><br>
                    <small id="chat-status" style="color:var(--primary); font-size: 11px;">محادثة آمنة</small>
                </div>
            </div>
            <div style="display: flex; gap: 15px; font-size:20px;">
                <span id="whisper-btn" style="color:var(--whisper); opacity:0.4; transition:0.3s;" onclick="toggleMode('whisper')">🤫</span>
                <span id="ghost-btn" style="color:var(--ghost); opacity:0.4; transition:0.3s;" onclick="toggleMode('ghost')">👻</span>
                <span onclick="openOptions()">⋮</span>
            </div>
        </div>
        
        <div class="msg-area" id="msg-area"></div>

        <div id="reply-preview" class="hidden" style="background: rgba(0,0,0,0.6); padding: 10px 15px; display:flex; justify-content:space-between; align-items:center; border-left: 3px solid var(--primary);">
            <div id="reply-text" style="font-size:12px; color:#ccc; max-width:85%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
            <span onclick="cancelReply()" style="color:var(--danger); cursor:pointer; font-weight:bold;">✕</span>
        </div>

        <div class="input-area" id="input-bar">
            <label class="action-btn" style="cursor:pointer;">
                📷 <input type="file" id="chat-img-input" accept="image/*" style="display:none;">
            </label>
            
            <input type="text" id="msg-input" placeholder="اكتب رسالة..." style="flex:1; background:rgba(255,255,255,0.1); border:none; border-radius:20px; padding:14px; color:white; font-size: 15px;">
            
            <button id="record-btn" class="action-btn" onmousedown="startRecord(event)" onmouseup="stopRecord(event)" ontouchstart="startRecord(event)" ontouchend="stopRecord(event)">🎤</button>
            <button id="send-btn" onclick="sendMsg()" class="action-btn hidden" style="background: var(--primary);">➤</button>
        </div>
        <div id="blocked-bar" class="hidden" style="padding:20px; text-align:center; background:rgba(255, 71, 87, 0.2); color: var(--danger); font-weight:bold; backdrop-filter: blur(10px);">لا يمكنك المراسلة، تم الحظر.</div>
    </div>

    <div id="opt-modal" class="modal hidden" onclick="this.classList.add('hidden')">
        <div class="glass-panel" style="width: 100%; max-width: 300px; padding: 10px 0;" onclick="event.stopPropagation()">
            <div style="padding:15px; text-align:center; border-bottom:1px solid var(--glass-border); cursor:pointer;" onclick="clearChat()">مسح المحادثة 🗑️</div>
            <div id="block-btn-txt" style="padding:15px; text-align:center; border-bottom:1px solid var(--glass-border); cursor:pointer; color:var(--danger);" onclick="blockUser()">حظر المستخدم 🚫</div>
        </div>
    </div>

    <div id="react-modal" class="modal hidden" onclick="this.classList.add('hidden')">
        <div class="glass-panel" style="display:flex; justify-content:space-around; padding:15px; width: 90%; max-width: 320px;" onclick="event.stopPropagation()">
            <span style="font-size:28px; cursor:pointer;" onclick="setReact('❤️')">❤️</span>
            <span style="font-size:28px; cursor:pointer;" onclick="setReact('😂')">😂</span>
            <span style="font-size:28px; cursor:pointer;" onclick="setReact('😮')">😮</span>
            <span style="font-size:28px; cursor:pointer;" onclick="setReact('🔥')">🔥</span>
            <div style="width: 1px; background: var(--glass-border); margin: 0 10px;"></div>
            <span style="font-size:22px; cursor:pointer; color:var(--primary);" onclick="makeReply()">↩️ رد</span>
        </div>
    </div>

    <script type="module">
        // التوصيلة بقاعدة البيانات (Firebase)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, child, update, remove, increment, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let me = null, activeF = null, activeC = null;
        let isGhost = false, isWhisper = false, replyTo = null, selectedMsgId = null;
        let mediaRecorder, audioChunks = [];
        let isRecording = false; // حل مشكلة ضغطات الموبايل
        let chatListener = null; // حل مشكلة تسريب وتكرار الرسائل

        // الزر الديناميكي للإدخال
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const recordBtn = document.getElementById('record-btn');
        msgInput.addEventListener('input', () => {
            if(msgInput.value.trim().length > 0) { sendBtn.classList.remove('hidden'); recordBtn.classList.add('hidden'); }
            else { sendBtn.classList.add('hidden'); recordBtn.classList.remove('hidden'); }
        });

        window.authAction = async (t) => {
            const e = document.getElementById(t==='login'?'email':'s-email').value;
            const p = document.getElementById(t==='login'?'pass':'s-pass').value;
            try { t==='login' ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p); }
            catch(err) { alert("بيانات غير صحيحة."); }
        };

        const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); });
        document.getElementById('img-input').onchange = async e => { if(e.target.files[0]) document.getElementById('prev-img').src = await toB64(e.target.files[0]); };
        
        document.getElementById('chat-img-input').onchange = async e => { 
            if(e.target.files[0]) { const imgB64 = await toB64(e.target.files[0]); pushData({ imgMsg: imgB64 }); } 
        };

        window.saveUser = async () => {
            const u = document.getElementById('set-user').value.trim().toLowerCase(), n = document.getElementById('set-nick').value.trim(), img = document.getElementById('prev-img').src;
            if(!n) return;
            if(!me) {
                const s = await get(child(ref(db), 'usernames/'+u));
                if(s.exists()) return alert("يوزر مأخوذ");
                await set(ref(db, 'usernames/'+u), auth.currentUser.uid);
                await set(ref(db, 'users/'+auth.currentUser.uid), { u, n, img });
            } else { await update(ref(db, 'users/'+auth.currentUser.uid), { n, img }); }
            location.reload();
        };

        window.tab = (t, el) => {
            document.getElementById('page-chats').classList.toggle('hidden', t!=='chats');
            document.getElementById('page-profile').classList.toggle('hidden', t!=='profile');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active');
        };

        window.findFriend = async () => {
            const u = prompt("أدخل Username:"); if(!u) return;
            const s = await get(child(ref(db), 'usernames/'+u.toLowerCase()));
            if(s.exists() && s.val() !== auth.currentUser.uid) {
                const fData = (await get(child(ref(db), 'users/'+s.val()))).val();
                openChat(s.val(), fData.n, fData.img);
            } else alert("غير موجود.");
        };

        window.openChat = async (id, name, img) => {
            // إيقاف أي مستمع رسائل قديم لمنع تكرار الرسائل في الواجهة
            if(chatListener) { chatListener(); chatListener = null; }

            activeF = id; activeC = [auth.currentUser.uid, id].sort().join("_");
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('h-name').innerHTML = `${name} <span id="h-online" class="offline-dot"></span>`;
            document.getElementById('h-img').src = img;
            
            // تصفير عداد الرسائل غير المقروءة عند فتح الشات
            set(ref(db, `unread/${auth.currentUser.uid}/${id}`), 0);
            
            await update(ref(db, `friends/${auth.currentUser.uid}/${id}`), { n: name, img: img });
            await update(ref(db, `friends/${id}/${auth.currentUser.uid}`), { n: me.n, img: me.img });
            
            // متابعة حالة اتصال الصديق
            onValue(ref(db, `presence/${id}`), s => {
                const dot = document.getElementById('h-online');
                if(dot) { dot.className = s.val() === true ? 'online-dot' : 'offline-dot'; }
            });

            checkBlock(); loadMsgs();
        };

        window.closeChat = () => { 
            document.getElementById('chat-window').classList.add('hidden'); 
            activeF = null; activeC = null; isGhost = false; isWhisper = false; 
            if(chatListener) { chatListener(); chatListener = null; } // إيقاف المستمع
        };

        window.toggleMode = (m) => {
            if(m==='ghost') { isGhost = !isGhost; document.getElementById('ghost-btn').style.opacity = isGhost ? "1" : "0.4"; }
            if(m==='whisper') { isWhisper = !isWhisper; document.getElementById('whisper-btn').style.opacity = isWhisper ? "1" : "0.4"; }
            let s = "آمنة";
            if(isGhost && isWhisper) s = "👻 شبح + 🤫 همس"; else if(isGhost) s = "👻 وضع الشبح (اختفاء)"; else if(isWhisper) s = "🤫 رسائل مهموسة";
            document.getElementById('chat-status').innerText = s;
        };

        // الريكورد المعدل المتوافق مع الايفون ومنع التكرار
        window.startRecord = async (e) => {
            if(e && e.type === "touchstart") e.preventDefault();
            if(isRecording) return;
            isRecording = true;
            recordBtn.classList.add('recording'); audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                mediaRecorder.ondataavailable = ev => { if (ev.data.size > 0) audioChunks.push(ev.data); };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    pushData({ audio: await toB64(audioBlob) });
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
            } catch(err) { alert("يرجى تفعيل المايك"); recordBtn.classList.remove('recording'); isRecording = false; }
        };

        window.stopRecord = (e) => { 
            if(e && e.type === "touchend") e.preventDefault();
            if(!isRecording) return;
            isRecording = false;
            if(mediaRecorder && mediaRecorder.state === "recording") { 
                mediaRecorder.stop(); recordBtn.classList.remove('recording'); 
            } 
        };

        window.sendMsg = () => {
            const t = msgInput.value; if(!t) return;
            pushData({ text: t }); msgInput.value = ""; 
            sendBtn.classList.add('hidden'); recordBtn.classList.remove('hidden'); cancelReply();
        };

        function pushData(content) {
            const data = { s: auth.currentUser.uid, time: Date.now(), g: isGhost, w: isWhisper, read: false };
            if(content.text) data.t = content.text; if(content.audio) data.a = content.audio; if(content.imgMsg) data.imgMsg = content.imgMsg; if(replyTo) data.reply = replyTo;
            
            const mRef = push(ref(db, 'messages/'+activeC)); set(mRef, data);
            
            // زيادة عداد غير المقروء للطرف الآخر
            const unreadRef = ref(db, `unread/${activeF}/${auth.currentUser.uid}`);
            get(unreadRef).then(s => set(unreadRef, (s.val() || 0) + 1));

            if(isGhost) setTimeout(() => remove(mRef), 10000);
        }

        function loadMsgs() {
            chatListener = onValue(ref(db, 'messages/'+activeC), snap => {
                if(!activeC) return;
                const box = document.getElementById('msg-area'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val(), d = document.createElement('div');
                    
                    // إذا كانت الرسالة مرسلة من الصديق، قم بتعليمها كمقروءة فوراً
                    if(m.s === activeF && m.read === false) { update(ref(db, `messages/${activeC}/${c.key}`), { read: true }); }

                    let classes = `glass-panel msg ${m.s === auth.currentUser.uid ? 'sent' : 'received'} `;
                    if(m.g) classes += 'ghost-msg '; if(m.w) classes += 'whisper-msg ';
                    d.className = classes;
                    
                    let html = "";
                    if(m.reply) html += `<div style="background:rgba(0,0,0,0.3); padding:8px; border-right:3px solid var(--primary); border-radius:8px; margin-bottom:8px; font-size:12px;">${m.reply}</div>`;
                    if(m.t) html += m.t;
                    if(m.imgMsg) html += `<img src="${m.imgMsg}" style="width:100%; border-radius:10px; margin-top:5px;">`;
                    if(m.a) html += `<audio src="${m.a}" controls playsinline></audio>`;
                    if(m.react) html += `<div style="position:absolute; bottom:-8px; right:10px; background:#222; border-radius:12px; padding:2px 6px; font-size:13px;">${m.react}</div>`;
                    
                    // نظام القراءة الجديد (سحابة للإرسال / عين متوهجة للرؤية)
                    if(m.s === auth.currentUser.uid) {
                        html += `<span class="msg-status-icon ${m.read ? 'status-seen' : ''}">${m.read ? '👁️ شوهدت' : '☁️ أُرسلت'}</span>`;
                    }

                    d.innerHTML = html;
                    d.onclick = () => { selectedMsgId = c.key; replyTo = m.t ? m.t : (m.imgMsg ? "صورة" : "مقطع صوتي"); document.getElementById('react-modal').classList.remove('hidden'); };
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.setReact = (r) => { update(ref(db, `messages/${activeC}/${selectedMsgId}`), { react: r }); document.getElementById('react-modal').classList.add('hidden'); };
        window.makeReply = () => { document.getElementById('reply-preview').classList.remove('hidden'); document.getElementById('reply-text').innerText = replyTo; document.getElementById('react-modal').classList.add('hidden'); };
        window.cancelReply = () => { replyTo = null; document.getElementById('reply-preview').classList.add('hidden'); };

        window.openOptions = () => { document.getElementById('opt-modal').classList.remove('hidden'); };
        
        window.blockUser = async () => { 
            alert("تم حظر المستخدم بنجاح.");
            document.getElementById('opt-modal').classList.add('hidden'); 
            document.getElementById('blocked-bar').classList.remove('hidden');
            document.getElementById('input-bar').classList.add('hidden');
        };
        
        window.clearChat = async () => { if(confirm("مسح السجل للطرفين؟")) { await remove(ref(db, 'messages/'+activeC)); closeChat(); document.getElementById('opt-modal').classList.add('hidden'); } };

        function checkBlock() { 
            // تأكيد ظهور شريط الإدخال عند فتح دردشة جديدة نظيفة
            document.getElementById('blocked-bar').classList.add('hidden');
            document.getElementById('input-bar').classList.remove('hidden');
        }

        window.addNote = async () => { const t = prompt("حالة جديدة (تختفي بعد 24 ساعة):"); if(t) await set(ref(db, 'notes/'+auth.currentUser.uid), { t, n: me.n, img: me.img, time: Date.now() }); };
        window.editProfile = () => { document.getElementById('setup-screen').classList.remove('hidden'); document.getElementById('set-user').classList.add('hidden'); document.getElementById('close-setup-btn').classList.remove('hidden'); };

        onAuthStateChanged(auth, async u => {
            if(u) {
                // نظام الأونلاين والأوفلاين التلقائي
                const connectedRef = ref(db, '.info/connected');
                onValue(connectedRef, snap => {
                    if (snap.val() === true) {
                        const myPresence = ref(db, `presence/${u.uid}`);
                        set(myPresence, true); onDisconnect(myPresence).set(false);
                    }
                });

                const s = await get(child(ref(db), 'users/'+u.uid));
                if(s.exists()) {
                    me = s.val();
                    document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('my-avatar').src = me.img; document.getElementById('my-name-display').innerText = me.n; document.getElementById('my-user-display').innerText = "@" + me.u;
                    initApp();
                } else { document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('setup-screen').classList.remove('hidden'); }
            }
        });

        function initApp() {
            // تحميل حالات الأصدقاء
            onValue(ref(db, 'notes'), snap => {
                const box = document.getElementById('notes-list'); box.innerHTML = `<div class="note-wrap" onclick="addNote()"><div class="note-img" style="border: 2px dashed rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; font-size:25px;">+</div><span style="font-size:11px; margin-top:5px; display:block;">حالة جديدة</span></div>`;
                snap.forEach(c => {
                    get(child(ref(db), `friends/${auth.currentUser.uid}/${c.key}`)).then(isF => {
                        if(isF.exists() || c.key === auth.currentUser.uid) {
                            const n = c.val(); if(Date.now() - n.time < 86400000) {
                                const d = document.createElement('div'); d.className = 'note-wrap';
                                d.innerHTML = `<div class="note-pop">${n.t}</div><img class="note-img" src="${n.img}"><span style="font-size:10px; display:block; margin-top:5px;">${n.n}</span>`; box.appendChild(d);
                            }
                        }
                    });
                });
            });

            // تحميل قائمة الأصدقاء مع نظام الرسائل غير المقروءة والاتصال
            onValue(ref(db, `friends/${auth.currentUser.uid}`), snap => {
                const box = document.getElementById('chat-items-list'); box.innerHTML = "";
                snap.forEach(c => {
                    const f = c.val(), fId = c.key;
                    const d = document.createElement('div');
                    d.className = 'glass-panel'; d.style = "display:flex; align-items:center; padding:15px; margin-bottom:10px; cursor:pointer;";
                    d.onclick = () => openChat(fId, f.n, f.img);
                    
                    let inner = `<img src="${f.img}" style="width:55px; height:55px; border-radius:50%; margin-left:15px; object-fit:cover; border:2px solid var(--primary);"><div><b style="font-size:16px;">${f.n}</b><br><small id="status-${fId}" style="color:#aaa;">جاري التحقق...</small></div>`;
                    inner += `<div id="unread-${fId}" class="unread-badge hidden">0</div>`;
                    d.innerHTML = inner; box.appendChild(d);

                    // تحديث الأونلاين في القائمة
                    onValue(ref(db, `presence/${fId}`), pSnap => {
                        const statusTxt = document.getElementById(`status-${fId}`);
                        if(statusTxt) { statusTxt.innerHTML = pSnap.val() === true ? `<span class="online-dot"></span> متصل الآن` : `<span class="offline-dot"></span> غير متصل`; }
                    });

                    // تحديث العداد
                    onValue(ref(db, `unread/${auth.currentUser.uid}/${fId}`), uSnap => {
                        const count = uSnap.val() || 0;
                        const badge = document.getElementById(`unread-${fId}`);
                        if(badge) { badge.innerText = count; badge.classList.toggle('hidden', count === 0); }
                    });
                });
            });
        }
    </script>
</body>
</html>
