<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAGEL | زاجل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* =========================================
           CSS - Midnight Neon Theme & Smooth UI
           ========================================= */
        :root {
            --bg-color: #0d0d12;
            --surface: #1a1a24;
            --neon-blue: #00f3ff;
            --neon-pink: #ff007c;
            --text-main: #ffffff;
            --text-muted: #8b8b9e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* حاوية التطبيق */
        #app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: var(--surface);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* الهيدر الزجاجي (Glassmorphism) */
        header {
            background: rgba(26, 26, 36, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        }

        header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
        }

        /* منطقة كتابة البوست */
        .create-post {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .create-post textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            outline: none;
            min-height: 60px;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .file-upload {
            color: var(--neon-blue);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .file-upload input {
            display: none;
        }

        .publish-btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.9;
            transition: 0.3s;
        }

        .publish-btn:hover {
            opacity: 1;
            box-shadow: 0 0 15px rgba(255, 0, 124, 0.4);
        }

        /* شكل المنشور (Post UI) */
        .post {
            background: var(--surface);
            margin-bottom: 10px;
            padding-bottom: 15px;
            border-bottom: 5px solid var(--bg-color);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 15px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--neon-pink);
            margin-left: 10px;
        }

        .post-user-info h4 {
            font-size: 0.9rem;
        }

        .post-user-info span {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .post-caption {
            padding: 0 15px 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            background: #111; /* لون مبدئي للـ Lazy Loading */
        }

        .post-footer {
            padding: 15px;
            display: flex;
            gap: 20px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn i.liked {
            color: var(--neon-pink);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .action-btn span {
            font-size: 0.9rem;
        }

        /* اللودينج */
        .loader {
            text-align: center;
            padding: 20px;
            color: var(--neon-blue);
            display: none;
        }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <h1>ZAGEL</h1>
            <button id="loginBtn" class="auth-btn">تسجيل الدخول</button>
            <div id="userInfo" style="display: none; font-size: 0.8rem; color: var(--neon-blue);"></div>
        </header>

        <div class="create-post">
            <textarea id="postCaption" placeholder="إيه الـ Vibe بتاعك دلوقتي؟"></textarea>
            <div class="post-actions">
                <label class="file-upload">
                    <i class="fa-solid fa-image"></i>
                    <input type="file" id="postImage" accept="image/*">
                </label>
                <button id="publishBtn" class="publish-btn">انشر Vibe</button>
            </div>
            <div id="uploadStatus" style="font-size: 0.8rem; color: var(--neon-pink); margin-top: 5px; display: none;">جاري الرفع للسرعة القصوى...</div>
        </div>

        <div class="loader" id="feedLoader"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i></div>
        <div id="feedContainer">
            </div>
    </div>

    <script type="module">
        // استيراد مكتبات Firebase عبر CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 1. إعدادات Firebase بتاعتك
        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // عناصر الـ DOM
        const loginBtn = document.getElementById('loginBtn');
        const userInfo = document.getElementById('userInfo');
        const publishBtn = document.getElementById('publishBtn');
        const feedContainer = document.getElementById('feedContainer');
        const postCaption = document.getElementById('postCaption');
        const postImageInput = document.getElementById('postImage');
        const uploadStatus = document.getElementById('uploadStatus');
        const feedLoader = document.getElementById('feedLoader');

        // 2. مراقبة حالة الدخول (Auth State)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginBtn.style.display = 'none';
                userInfo.style.display = 'block';
                userInfo.innerText = `أهلاً, ${user.displayName.split(' ')[0]}`;
                loadFeed(); // تحميل البوستات بمجرد الدخول
            } else {
                currentUser = null;
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
                feedContainer.innerHTML = '<p style="text-align:center; padding:20px; color:#8b8b9e;">سجل دخول عشان تشوف الـ Vibes 🚀</p>';
            }
        });

        // 3. تسجيل الدخول بجوجل
        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => alert("خطأ في تسجيل الدخول: " + err.message));
        });

        // 4. نظام Cloudinary الذكي (بدون API Key للـ Frontend)
        const uploadToCloudinary = async (file) => {
            const formData = new FormData();
            formData.append("file", file);
            // **مهم:** غيّر دول لبيانات حسابك في Cloudinary
            formData.append("upload_preset", "YOUR_UNSIGNED_PRESET"); // ضعه هنا
            const CLOUD_NAME = "YOUR_CLOUD_NAME"; // ضعه هنا

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: "POST",
                body: formData,
            });
            const data = await res.json();
            // نطلب الصورة بجودة محترمة ومضغوطة تلقائياً للسرعة
            return data.secure_url.replace('/upload/', '/upload/w_600,q_auto,f_webp/'); 
        };

        // 5. نشر بوست جديد
        publishBtn.addEventListener('click', async () => {
            if (!currentUser) return alert("سجل دخول الأول يا بطل!");
            
            const caption = postCaption.value.trim();
            const file = postImageInput.files[0];
            
            if (!caption && !file) return alert("اكتب حاجة أو نزل صورة!");

            publishBtn.disabled = true;
            if(file) uploadStatus.style.display = 'block';

            try {
                let imageUrl = null;
                if (file) {
                    imageUrl = await uploadToCloudinary(file);
                }

                await addDoc(collection(db, "posts"), {
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    userAvatar: currentUser.photoURL,
                    caption: caption,
                    imageUrl: imageUrl,
                    likes: [], // مصفوفة لتخزين الـ IDs بتاعة اللي عملوا لايك
                    createdAt: serverTimestamp()
                });

                // تصفير الخانات بعد النشر
                postCaption.value = '';
                postImageInput.value = '';
                uploadStatus.style.display = 'none';
            } catch (error) {
                console.error("خطأ:", error);
                alert("حصلت مشكلة في النشر");
            } finally {
                publishBtn.disabled = false;
            }
        });

        // 6. تحميل البوستات (Real-time Feed)
        const loadFeed = () => {
            feedLoader.style.display = 'block';
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50));

            onSnapshot(q, (snapshot) => {
                feedLoader.style.display = 'none';
                feedContainer.innerHTML = ''; // تفريغ القديم

                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const postId = doc.id;
                    const timeAgo = post.createdAt ? new Date(post.createdAt.toDate()).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}) : 'الآن';
                    
                    // الكود الذكي للـ Like
                    const isLikedByMe = currentUser ? post.likes.includes(currentUser.uid) : false;
                    const likesCount = post.likes.length;

                    const postElement = document.createElement('div');
                    postElement.className = 'post';
                    postElement.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userAvatar || 'https://via.placeholder.com/40'}" class="post-avatar" alt="user">
                            <div class="post-user-info">
                                <h4>${post.userName}</h4>
                                <span>${timeAgo}</span>
                            </div>
                        </div>
                        ${post.caption ? `<div class="post-caption">${post.caption}</div>` : ''}
                        ${post.imageUrl ? `<img src="${post.imageUrl}" class="post-image" loading="lazy" alt="Post Image">` : ''}
                        <div class="post-footer">
                            <button class="action-btn like-btn" data-id="${postId}" data-liked="${isLikedByMe}">
                                <i class="fa-heart ${isLikedByMe ? 'fa-solid liked' : 'fa-regular'}"></i>
                                <span>${likesCount}</span>
                            </button>
                            <button class="action-btn">
                                <i class="fa-regular fa-comment"></i>
                            </button>
                        </div>
                    `;
                    feedContainer.appendChild(postElement);
                });

                // تفعيل زراير اللايك
                attachLikeListeners();
            });
        };

        // 7. الـ Smart Like (Optimistic UI & Firestore Array Update)
        const attachLikeListeners = () => {
            const likeBtns = document.querySelectorAll('.like-btn');
            likeBtns.forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (!currentUser) return alert("لازم تسجل دخول عشان تعمل لايك!");
                    
                    const postId = btn.getAttribute('data-id');
                    const isLiked = btn.getAttribute('data-liked') === 'true';
                    const postRef = doc(db, "posts", postId);
                    const icon = btn.querySelector('i');
                    const countSpan = btn.querySelector('span');

                    // 1. Optimistic UI (تغيير الشكل فوراً قبل ما السيرفر يرد لمنع اللاج)
                    btn.setAttribute('data-liked', !isLiked);
                    let currentCount = parseInt(countSpan.innerText);
                    
                    if (isLiked) {
                        icon.classList.remove('fa-solid', 'liked');
                        icon.classList.add('fa-regular');
                        countSpan.innerText = currentCount - 1;
                        // إرسال الطلب للسيرفر للحذف
                        await updateDoc(postRef, { likes: arrayRemove(currentUser.uid) });
                    } else {
                        icon.classList.remove('fa-regular');
                        icon.classList.add('fa-solid', 'liked');
                        countSpan.innerText = currentCount + 1;
                        // إرسال الطلب للسيرفر بالإضافة
                        await updateDoc(postRef, { likes: arrayUnion(currentUser.uid) });
                    }
                });
            });
        };
    </script>
</body>
</html>
