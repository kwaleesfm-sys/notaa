<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NootaChat Ultra Turbo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a29bfe; --primary-dark: #6c5ce7;
            --danger: #ff7675; --ghost: #00cec9; --whisper: #fdcb6e; --success: #00e676;
            --bg: #090a0f; --card: #16161e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* الأنيميشن السريع */
        .page { position: fixed; inset: 0; background: var(--bg); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        #chat-window { transform: translateX(100%); z-index: 1000; }
        #chat-window.active { transform: translateX(0); }

        /* القوائم */
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .list-item { display: flex; align-items: center; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .list-item:active { background: rgba(255,255,255,0.05); transform: scale(0.98); }

        /* الشات */
        .chat-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .msg-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; height: calc(100vh - 130px); }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; position: relative; animation: pop 0.2s ease-out; word-wrap: break-word; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .sent { background: var(--primary-dark); align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .ghost-msg { border: 1px dashed var(--ghost); color: var(--ghost); }
        .whisper-msg { filter: blur(5px); cursor: pointer; }
        .whisper-msg:active { filter: blur(0); }

        /* المدخلات */
        .input-bar { padding: 10px; background: #000; display: flex; align-items: center; gap: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
        .main-input { flex: 1; background: #1a1a24; border: none; padding: 12px 18px; border-radius: 25px; color: #fff; }
        .icon-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(255,255,255,0.05); border: none; color: #fff; cursor: pointer; }

        .unread { background: var(--danger); padding: 2px 7px; border-radius: 10px; font-size: 11px; margin-right: auto; }
        .online-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px var(--success); }

        /* الردود (Reply) */
        #reply-preview { background: rgba(0,0,0,0.5); padding: 8px 15px; display: flex; justify-content: space-between; border-left: 3px solid var(--primary); font-size: 12px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="page" style="display: flex; align-items: center; justify-content: center; z-index: 5000;">
        <div class="glass-panel" style="padding: 30px; width: 90%; max-width: 350px; text-align: center;">
            <h1 style="color:var(--primary); margin-bottom: 25px;">NootaChat</h1>
            <input type="email" id="email" class="main-input" placeholder="البريد الإلكتروني" style="width: 100%; margin-bottom: 12px;">
            <input type="password" id="pass" class="main-input" placeholder="كلمة المرور" style="width: 100%; margin-bottom: 12px;">
            <button onclick="authAction('login')" style="width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--primary-dark); color: white; font-weight: bold;">دخول</button>
            <p onclick="document.getElementById('signup-modal').classList.remove('hidden')" style="margin-top: 15px; font-size: 12px; color: var(--primary); cursor: pointer;">ليس لديك حساب؟ سجل الآن</p>
        </div>
    </div>

    <div id="app-screen" class="page hidden">
        <div style="padding: 20px; height: 100%; overflow-y: auto;">
            <h2 style="margin-bottom: 20px; font-size: 28px; font-weight: 800;">الدردشات</h2>
            <div id="chat-list"></div>
            <button onclick="findFriend()" class="glass-panel" style="width:100%; padding:15px; color:var(--primary); font-weight:bold; border:none; margin-top:10px;">+ إضافة صديق جديد</button>
        </div>
    </div>

    <div id="chat-window" class="page">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="closeChat()" style="font-size:24px;">➔</span>
                <img id="h-img" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <div onclick="openOptions()">
                    <b id="h-name"></b><br>
                    <small id="h-status" style="font-size:10px;"></small>
                </div>
            </div>
            <div style="display:flex; gap:12px;">
                <span id="w-btn" onclick="mode('whisper')" style="opacity:0.3;">🤫</span>
                <span id="g-btn" onclick="mode('ghost')" style="opacity:0.3;">👻</span>
                <span onclick="openOptions()">⋮</span>
            </div>
        </div>

        <div class="msg-area" id="msg-area"></div>

        <div id="reply-box" class="hidden">
            <div id="reply-preview">
                <span id="reply-text" style="color:#aaa;"></span>
                <span onclick="cancelReply()">✕</span>
            </div>
        </div>

        <div class="input-bar">
            <label class="icon-btn">📷<input type="file" style="display:none;" onchange="sendImg(this)"></label>
            <input type="text" id="msg-input" class="main-input" placeholder="رسالة..." oninput="checkInput(this)">
            <button id="send-btn" onclick="sendMsg()" class="icon-btn hidden" style="background:var(--primary);">➤</button>
            <button id="rec-btn" class="icon-btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()">🎤</button>
        </div>
    </div>

    <div id="opt-modal" class="modal hidden" onclick="this.classList.add('hidden')">
        <div class="glass-panel" style="width: 260px; background: #16161e;" onclick="event.stopPropagation()">
            <div style="padding: 15px; border-bottom: 1px solid #333;" onclick="clearChat()">مسح المحادثة 🗑️</div>
            <div style="padding: 15px; border-bottom: 1px solid #333; color: var(--whisper);" onclick="reportUser()">إبلاغ عن المستخدم 🚩</div>
            <div style="padding: 15px; color: var(--danger);" onclick="blockUser()">حظر المستخدم 🚫</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, update, remove, off, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const config = { apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M", authDomain: "fir-c3e88.firebaseapp.com", databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com", projectId: "fir-c3e88" };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let me = null, activeF = null, activeC = null, chatSub = null, isGhost = false, isWhisper = false, replyTo = null;
        let mediaRec, audioChunks = [];

        onAuthStateChanged(auth, async u => {
            if(u) {
                const s = await get(ref(db, 'users/'+u.uid));
                if(s.exists()) {
                    if(s.val().banned) return alert("حسابك محظور نهائياً");
                    me = s.val();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    
                    const myPresence = ref(db, `presence/${u.uid}`);
                    set(myPresence, true); onDisconnect(myPresence).set(false);
                    initApp();
                }
            }
        });

        window.authAction = (t) => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => alert("بيانات خاطئة"));
        };

        function initApp() {
            onValue(ref(db, `friends/${auth.currentUser.uid}`), snap => {
                const box = document.getElementById('chat-list'); box.innerHTML = "";
                snap.forEach(c => {
                    const f = c.val(), fId = c.key;
                    const d = document.createElement('div'); d.className = 'glass-panel list-item';
                    d.onclick = () => openChat(fId, f.n, f.img);
                    d.innerHTML = `
                        <img src="${f.img}" style="width:50px; height:50px; border-radius:50%; margin-left:12px;">
                        <div style="flex:1;"><b>${f.n}</b><br><small id="st-${fId}">...</small></div>
                        <div id="ur-${fId}" class="unread hidden">0</div>
                    `;
                    box.appendChild(d);
                    onValue(ref(db, `presence/${fId}`), p => {
                        const el = document.getElementById(`st-${fId}`);
                        if(el) el.innerHTML = p.val() ? `<span class="online-dot"></span> نشط` : `غير متصل`;
                    });
                    onValue(ref(db, `unread/${auth.currentUser.uid}/${fId}`), u => {
                        const el = document.getElementById(`ur-${fId}`);
                        if(el) { el.innerText = u.val(); el.classList.toggle('hidden', !u.val()); }
                    });
                });
            });
        }

        window.openChat = (id, name, img) => {
            if(chatSub) off(chatSub);
            activeF = id; activeC = [auth.currentUser.uid, id].sort().join("_");
            document.getElementById('h-name').innerText = name;
            document.getElementById('h-img').src = img;
            document.getElementById('chat-window').classList.add('active');
            set(ref(db, `unread/${auth.currentUser.uid}/${id}`), 0);
            loadMsgs();
        };

        function loadMsgs() {
            chatSub = ref(db, 'messages/'+activeC);
            onValue(chatSub, snap => {
                const box = document.getElementById('msg-area'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const isMe = m.s === auth.currentUser.uid;
                    const d = document.createElement('div'); d.style = "display:flex; flex-direction:column; width:100%;";
                    
                    let content = `<div class="msg ${isMe?'sent':'received'} ${m.g?'ghost-msg':''} ${m.w?'whisper-msg':''}" onclick="msgOpt('${c.key}', '${m.t||'وسائط'}')">`;
                    if(m.reply) content += `<div style="background:rgba(0,0,0,0.2); padding:5px; font-size:11px; margin-bottom:5px; border-left:2px solid #fff;">${m.reply}</div>`;
                    if(m.t) content += m.t;
                    if(m.img) content += `<img src="${m.img}" style="width:100%; border-radius:10px;">`;
                    if(m.a) content += `<audio src="${m.a}" controls style="height:35px;"></audio>`;
                    content += `</div>`;
                    
                    if(isMe) content += `<small style="align-self:flex-end; font-size:10px; opacity:0.5;">${m.read?'👁️':'☁️'}</small>`;
                    
                    d.innerHTML = content; box.appendChild(d);
                    if(!isMe && !m.read) update(ref(db, `messages/${activeC}/${c.key}`), {read:true});
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const t = document.getElementById('msg-input').value; if(!t) return;
            const data = { s: auth.currentUser.uid, t, time: Date.now(), read: false, g: isGhost, w: isWhisper };
            if(replyTo) data.reply = replyTo;
            const mRef = push(ref(db, 'messages/'+activeC)); set(mRef, data);
            
            get(ref(db, `unread/${activeF}/${auth.currentUser.uid}`)).then(s => set(ref(db, `unread/${activeF}/${auth.currentUser.uid}`), (s.val()||0)+1));
            
            document.getElementById('msg-input').value = ""; cancelReply(); checkInput(document.getElementById('msg-input'));
            if(isGhost) setTimeout(() => remove(mRef), 10000);
        };

        window.mode = (m) => {
            if(m==='ghost') { isGhost=!isGhost; document.getElementById('g-btn').style.opacity = isGhost?'1':'0.3'; }
            else { isWhisper=!isWhisper; document.getElementById('w-btn').style.opacity = isWhisper?'1':'0.3'; }
        };

        window.msgOpt = (id, text) => { if(confirm("الرد على هذه الرسالة؟")) { replyTo = text; document.getElementById('reply-box').classList.remove('hidden'); document.getElementById('reply-text').innerText = text; } };
        window.cancelReply = () => { replyTo = null; document.getElementById('reply-box').classList.add('hidden'); };

        window.openOptions = () => document.getElementById('opt-modal').classList.remove('hidden');
        window.reportUser = async () => {
            const rRef = ref(db, `reports/${activeF}`);
            const s = await get(rRef); let count = (s.val()||0)+1;
            await set(rRef, count); if(count>=10) await update(ref(db, `users/${activeF}`), {banned:true});
            alert("تم التبليغ");
        };

        window.closeChat = () => { document.getElementById('chat-window').classList.remove('active'); off(chatSub); };
        window.checkInput = (el) => { 
            const hasText = el.value.trim().length > 0;
            document.getElementById('send-btn').classList.toggle('hidden', !hasText);
            document.getElementById('rec-btn').classList.toggle('hidden', hasText);
        };
        
        // الريكورد
        window.startRec = async () => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRec = new MediaRecorder(s); audioChunks = [];
                mediaRec.ondataavailable = e => audioChunks.push(e.data);
                mediaRec.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp4' });
                    const reader = new FileReader(); reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const mRef = push(ref(db, 'messages/'+activeC));
                        set(mRef, { s: auth.currentUser.uid, a: reader.result, time: Date.now(), read: false });
                    };
                };
                mediaRec.start();
            } catch { alert("فعل المايك"); }
        };
        window.stopRec = () => { if(mediaRec) mediaRec.stop(); };
    </script>
</body>
</html>
