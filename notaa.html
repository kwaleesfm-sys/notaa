<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NootaChat Ultimate Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a29bfe; --primary-dark: #6c5ce7;
            --danger: #ff7675; --ghost: #00cec9; --whisper: #fdcb6e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #090a0f, #1b1625, #0f172a); 
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; 
            color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .glass-panel { 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
            border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
        }

        .hidden { display: none !important; }
        
        .btn-glass { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border: none; padding: 16px; border-radius: 16px; color: white; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }
        .btn-glass:active { transform: scale(0.97); }
        .input-glass { 
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 16px; 
            padding: 16px; color: white; width: 100%; text-align: center; margin-bottom: 15px; transition: 0.3s;
        }
        .input-glass:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.4); }

        /* شريط التنقل */
        .bottom-nav { 
            position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; display: flex; z-index: 100; padding: 10px;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); font-weight: bold; text-shadow: 0 0 10px rgba(162, 155, 254, 0.5); transform: translateY(-3px); }

        /* زر إضافة صديق الدائري (FAB) */
        .fab-btn {
            position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px;
            border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; font-size: 28px; border: none; box-shadow: 0 6px 20px rgba(108, 92, 231, 0.5);
            display: flex; justify-content: center; align-items: center; z-index: 90; cursor: pointer; transition: 0.3s;
        }
        .fab-btn:active { transform: scale(0.9); }

        /* النوتس (الحالات) */
        .notes-bar { display: flex; gap: 15px; padding: 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--glass-border); }
        .note-wrap { min-width: 70px; text-align: center; position: relative; cursor: pointer; }
        .note-img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; object-fit: cover; }
        .note-pop { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }

        /* المحادثة */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(25px); z-index: 300; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 78%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.4; transition: 0.2s; }
        .sent { align-self: flex-end; background: var(--primary-dark); border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2); }
        .received { align-self: flex-start; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        .view-once-btn { background: var(--danger); color: white; padding: 8px 15px; border-radius: 10px; font-size: 12px; cursor: pointer; display: inline-block; margin-top: 5px; text-align: center; }

        /* تصميم مشغل الصوت (Apple Style) */
        audio { height: 35px; width: 220px; border-radius: 20px; filter: sepia(20%) saturate(70%) grayscale(100%) contrast(99%) invert(80%); }

        /* منطقة الإدخال المحدثة */
        .input-area { padding: 15px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px; }
        .action-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 18px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .action-btn.active { background: var(--danger); animation: pulse 1s infinite; }
        .toggle-btn.active { background: var(--ghost); color: black; box-shadow: 0 0 10px var(--ghost); }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 10px var(--danger); } 100% { transform: scale(1); } }

        /* المنشورات */
        .post-card { padding: 20px; margin: 15px; border-radius: 20px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; }

        /* اللودينج */
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-screen" class="modal">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h1 style="color:var(--primary); font-size: 35px; margin-bottom: 5px;">NootaChat</h1>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 30px; font-size: 14px;">الإصدار الزجاجي</p>
            <input type="email" id="email" class="input-glass" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" class="input-glass" placeholder="كلمة المرور">
            <button class="btn-glass" onclick="authAction('login')">دخول</button>
            <p onclick="document.getElementById('signup-modal').classList.remove('hidden')" style="margin-top: 20px; font-size: 13px; color: var(--primary); cursor: pointer;">إنشاء حساب جديد</p>
        </div>
    </div>

    <div id="signup-modal" class="modal hidden">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h2>تسجيل جديد</h2><br>
            <input type="email" id="s-email" class="input-glass" placeholder="بريد إلكتروني صالح">
            <input type="password" id="s-pass" class="input-glass" placeholder="كلمة مرور قوية">
            <button class="btn-glass" onclick="authAction('signup')">إنشاء الحساب</button>
            <p onclick="document.getElementById('signup-modal').classList.add('hidden')" style="margin-top: 15px; color: #ccc; cursor: pointer;">إلغاء</p>
        </div>
    </div>

    <div id="setup-screen" class="modal hidden">
        <div class="glass-panel" style="padding: 30px; width: 100%; max-width: 380px; text-align: center;">
            <h2 id="setup-title" style="margin-bottom: 20px;">هويتك الرقمية</h2>
            <div style="position:relative; width:110px; height:110px; margin:0 auto 20px;">
                <img id="prev-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100%; height:100%; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                <input type="file" id="img-input" accept="image/*" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
                <div style="position:absolute; bottom:0; right:0; background:var(--primary); width:30px; height:30px; border-radius:50%; line-height:30px;">📷</div>
            </div>
            <input type="text" id="set-user" class="input-glass" placeholder="Username (للبحث عنك)">
            <input type="text" id="set-nick" class="input-glass" placeholder="اللقب الظاهر للأصدقاء">
            <button class="btn-glass" onclick="saveUser()">حفظ</button>
        </div>
    </div>

    <div id="app-screen" class="hidden" style="height:100%; display:flex; flex-direction:column;">
        
        <div id="page-chats" style="flex:1; overflow-y:auto; padding-bottom:100px;">
            <div style="padding: 25px 20px 10px; font-size: 28px; font-weight: 800;">الدردشات</div>
            <div class="notes-bar" id="notes-list">
                <div class="note-wrap" onclick="addNote()">
                    <div class="note-img" style="border: 2px dashed rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; font-size:25px;">+</div>
                    <span style="font-size:11px; margin-top:5px; display:block;">حالة جديدة</span>
                </div>
            </div>
            <div id="chat-items-list" style="padding: 10px;"></div>
            
            <button class="fab-btn" onclick="findFriend()">+</button>
        </div>

        <div id="page-posts" class="hidden" style="flex:1; overflow-y:auto; padding-bottom:100px;">
            <div style="padding: 25px 20px 10px; font-size: 28px; font-weight: 800;">المنشورات</div>
            <div class="glass-panel" style="margin: 15px; padding: 15px;">
                <textarea id="post-text" class="input-glass" placeholder="بم تفكر؟" style="resize:none; height:60px;"></textarea>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="post-img-input" accept="image/*" style="display:none;">
                    <button class="action-btn" onclick="document.getElementById('post-img-input').click()">📷</button>
                    <button class="btn-glass" style="flex:1; padding:10px;" onclick="createPost()">نشر</button>
                </div>
            </div>
            <div id="posts-feed"></div>
        </div>

        <div id="page-profile" class="hidden" style="flex:1; padding:50px 20px; text-align:center;">
            <div class="glass-panel" style="padding: 40px 20px;">
                <img id="my-avatar" src="" style="width:140px; height:140px; border-radius:50%; border:4px solid var(--primary); object-fit:cover; margin-bottom: 15px;">
                <h2 id="my-name-display">...</h2>
                <p id="my-user-display" style="color:rgba(255,255,255,0.5); margin-bottom: 30px;">@...</p>
                <button class="btn-glass" style="background: var(--danger);" onclick="location.reload()">تسجيل خروج</button>
            </div>
        </div>

        <div class="glass-panel bottom-nav">
            <div class="nav-item active" onclick="tab('chats', this)"><span style="font-size:22px;">💬</span>دردشة</div>
            <div class="nav-item" onclick="tab('posts', this)"><span style="font-size:22px;">🌍</span>المنشورات</div>
            <div class="nav-item" onclick="tab('profile', this)"><span style="font-size:22px;">👤</span>حسابي</div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">➔</button>
                <img id="h-img" src="" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                <div>
                    <b id="h-name" style="font-size: 16px;">...</b>
                </div>
            </div>
            <span onclick="document.getElementById('opt-modal').classList.remove('hidden')" style="font-size:22px; cursor:pointer;">⋮</span>
        </div>
        
        <div class="msg-area" id="msg-area"></div>

        <div class="input-area" id="input-bar">
            <input type="file" id="chat-img-input" accept="image/*" style="display:none;" onchange="sendChatImage(this)">
            <button class="action-btn" onclick="document.getElementById('chat-img-input').click()">📎</button>
            
            <button id="view-once-toggle" class="action-btn toggle-btn" onclick="this.classList.toggle('active')" title="صورة لمرة واحدة">1️⃣</button>
            
            <button id="record-btn" class="action-btn" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
            
            <input type="text" id="msg-input" placeholder="رسالة..." style="flex:1; background:rgba(255,255,255,0.1); border:none; border-radius:20px; padding:12px 15px; color:white;">
            <button onclick="sendMsg()" class="action-btn" style="background: var(--primary);">➤</button>
        </div>
    </div>

    <div id="opt-modal" class="modal hidden" onclick="this.classList.add('hidden')">
        <div class="glass-panel" style="width: 100%; max-width: 300px; padding: 10px 0;" onclick="event.stopPropagation()">
            <div style="padding:15px; text-align:center; border-bottom:1px solid var(--glass-border); cursor:pointer;" onclick="clearChat()">مسح المحادثة 🗑️</div>
            <div style="padding:15px; text-align:center; cursor:pointer; color:var(--danger);" onclick="document.getElementById('opt-modal').classList.add('hidden')">إغلاق</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        
        // إضافات جديدة للستوريدج والفايرستور
        import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);
        const firestore = getFirestore(app);

        let me = null, activeF = null, activeC = null;
        let mediaRecorder, audioChunks = [];

        window.authAction = async (t) => {
            const e = document.getElementById(t==='login'?'email':'s-email').value;
            const p = document.getElementById(t==='login'?'pass':'s-pass').value;
            try { t==='login' ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p); }
            catch(err) { alert("بيانات غير صحيحة."); }
        };

        const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); });
        document.getElementById('img-input').onchange = async e => { if(e.target.files[0]) document.getElementById('prev-img').src = await toB64(e.target.files[0]); };

        window.saveUser = async () => {
            const u = document.getElementById('set-user').value.trim().toLowerCase(), n = document.getElementById('set-nick').value.trim(), img = document.getElementById('prev-img').src;
            if(!n || !u) return alert("البيانات مطلوبة");
            await set(ref(db, 'usernames/'+u), auth.currentUser.uid);
            await set(ref(db, 'users/'+auth.currentUser.uid), { u, n, img });
            location.reload();
        };

        window.tab = (t, el) => {
            document.getElementById('page-chats').classList.add('hidden');
            document.getElementById('page-posts').classList.add('hidden');
            document.getElementById('page-profile').classList.add('hidden');
            document.getElementById('page-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(t === 'posts') loadPosts();
        };

        window.findFriend = async () => {
            const u = prompt("أدخل يوزر صديقك:"); if(!u) return;
            const s = await get(child(ref(db), 'usernames/'+u.toLowerCase()));
            if(s.exists() && s.val() !== auth.currentUser.uid) {
                const fData = (await get(child(ref(db), 'users/'+s.val()))).val();
                openChat(s.val(), fData.n, fData.img);
            } else alert("حساب غير موجود.");
        };

        window.openChat = async (id, name, img) => {
            activeF = id; activeC = [auth.currentUser.uid, id].sort().join("_");
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('h-name').innerText = name;
            document.getElementById('h-img').src = img;
            await update(ref(db, `friends/${auth.currentUser.uid}/${id}`), { n: name, img: img });
            await update(ref(db, `friends/${id}/${auth.currentUser.uid}`), { n: me.n, img: me.img });
            loadMsgs();
        };

        window.closeChat = () => { document.getElementById('chat-window').classList.add('hidden'); };

        /* تسجيل الصوت */
        window.startRecord = async () => {
            document.getElementById('record-btn').classList.add('active');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    // رفع الفويس للستوريدج لتجنب اللاج
                    uploadFileToStorage(audioBlob, 'audio', url => pushData({ audio: url }));
                    audioChunks = [];
                };
                mediaRecorder.start();
            } catch(e) { alert("يرجى السماح باستخدام الميكروفون"); document.getElementById('record-btn').classList.remove('active'); }
        };
        window.stopRecord = () => { if(mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); document.getElementById('record-btn').classList.remove('active'); } };

        window.sendMsg = () => {
            const t = document.getElementById('msg-input').value; if(!t) return;
            pushData({ text: t }); document.getElementById('msg-input').value = "";
        };

        /* إرسال صورة في الشات مع خيار وان سي وبدون لاج */
        window.sendChatImage = (input) => {
            const file = input.files[0]; if(!file) return;
            const isViewOnce = document.getElementById('view-once-toggle').classList.contains('active');
            
            // إنشاء رسالة وهمية مؤقتة (لإظهار اللودينج للمستخدم)
            const tempId = Date.now().toString();
            const box = document.getElementById('msg-area');
            box.innerHTML += `<div id="temp-${tempId}" class="glass-panel msg sent"><div class="loader"></div> جاري إرسال الصورة...</div>`;
            box.scrollTop = box.scrollHeight;

            uploadFileToStorage(file, 'chat_images', url => {
                document.getElementById(`temp-${tempId}`)?.remove();
                pushData({ img: url, viewOnce: isViewOnce });
                document.getElementById('view-once-toggle').classList.remove('active'); // إعادة الضبط
            });
            input.value = "";
        };

        // دالة الرفع إلى Storage
        function uploadFileToStorage(file, folder, callback) {
            const fileRef = sRef(storage, `${folder}/${Date.now()}_${auth.currentUser.uid}`);
            const uploadTask = uploadBytesResumable(fileRef, file);
            uploadTask.on('state_changed', null, error => alert("فشل الرفع"), () => {
                getDownloadURL(uploadTask.snapshot.ref).then(callback);
            });
        }

        function pushData(content) {
            const data = { s: auth.currentUser.uid, time: Date.now() };
            if(content.text) data.t = content.text;
            if(content.audio) data.a = content.audio;
            if(content.img) { data.i = content.img; data.vo = content.viewOnce; }
            push(ref(db, 'messages/'+activeC), data);
        }

        function loadMsgs() {
            onValue(ref(db, 'messages/'+activeC), snap => {
                const box = document.getElementById('msg-area'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val(), msgKey = c.key;
                    const d = document.createElement('div');
                    d.className = `glass-panel msg ${m.s === auth.currentUser.uid ? 'sent' : 'received'}`;
                    
                    if(m.t) d.innerText = m.t;
                    if(m.a) d.innerHTML = `<audio src="${m.a}" controls></audio>`;
                    if(m.i) {
                        if(m.vo) {
                            if(m.s === auth.currentUser.uid) {
                                d.innerHTML = `📷 صورة (View Once) - تم الإرسال`;
                            } else {
                                d.innerHTML = `<div class="view-once-btn" onclick="openViewOnce('${m.i}', '${msgKey}')">اضغط لرؤية الصورة 🔓</div>`;
                            }
                        } else {
                            d.innerHTML = `<img src="${m.i}" onclick="window.open('${m.i}')">`;
                        }
                    }
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        /* منطق الـ View Once */
        window.openViewOnce = (imgUrl, msgKey) => {
            // فتح الصورة في نافذة منبثقة بسيطة
            const modal = document.createElement('div');
            modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;";
            modal.innerHTML = `<img src="${imgUrl}" style="max-width:90%; max-height:80%; border-radius:15px;"><br><button class="btn-glass" style="width:200px; background:var(--danger);" onclick="this.parentElement.remove()">إغلاق وحذف 💥</button>`;
            document.body.appendChild(modal);
            
            // حذف الرسالة فوراً من قاعدة البيانات حتى لا تظهر مجدداً
            remove(ref(db, `messages/${activeC}/${msgKey}`));
        };

        window.clearChat = async () => { if(confirm("مسح السجل؟")) { await remove(ref(db, 'messages/'+activeC)); closeChat(); document.getElementById('opt-modal').classList.add('hidden'); } };

        /* --- نظام المنشورات (Firestore) --- */
        window.createPost = async () => {
            const text = document.getElementById('post-text').value;
            const file = document.getElementById('post-img-input').files[0];
            if(!text && !file) return;

            document.getElementById('post-text').value = "جاري النشر...";

            const saveToFirestore = async (imgUrl = null) => {
                await addDoc(collection(firestore, "posts"), {
                    uid: auth.currentUser.uid,
                    name: me.n,
                    avatar: me.img,
                    text: text,
                    image: imgUrl,
                    createdAt: serverTimestamp()
                });
                document.getElementById('post-text').value = "";
                document.getElementById('post-img-input').value = "";
            };

            if(file) uploadFileToStorage(file, 'posts', saveToFirestore);
            else saveToFirestore();
        };

        function loadPosts() {
            const q = query(collection(firestore, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('posts-feed'); feed.innerHTML = "";
                snapshot.forEach((doc) => {
                    const p = doc.data();
                    feed.innerHTML += `
                        <div class="glass-panel post-card">
                            <div class="post-header">
                                <img src="${p.avatar}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                <b>${p.name}</b>
                            </div>
                            <p style="font-size:14px; line-height:1.5;">${p.text}</p>
                            ${p.image ? `<img src="${p.image}" class="post-img">` : ''}
                        </div>`;
                });
            });
        }

        onAuthStateChanged(auth, async u => {
            if(u) {
                const s = await get(child(ref(db), 'users/'+u.uid));
                if(s.exists()) {
                    me = s.val();
                    document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('my-avatar').src = me.img; document.getElementById('my-name-display').innerText = me.n; document.getElementById('my-user-display').innerText = "@" + me.u;
                    initApp();
                } else { document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('setup-screen').classList.remove('hidden'); }
            }
        });

        function initApp() {
            onValue(ref(db, `friends/${auth.currentUser.uid}`), snap => {
                const box = document.getElementById('chat-items-list'); box.innerHTML = "";
                snap.forEach(c => {
                    const f = c.val(); const d = document.createElement('div');
                    d.className = 'glass-panel';
                    d.style = "display:flex; align-items:center; padding:15px; margin-bottom:10px; cursor:pointer;";
                    d.onclick = () => openChat(c.key, f.n, f.img);
                    d.innerHTML = `<img src="${f.img}" style="width:55px; height:55px; border-radius:50%; margin-left:15px; object-fit:cover; border:2px solid var(--primary);"><div><b style="font-size:16px;">${f.n}</b></div>`;
                    box.appendChild(d);
                });
            });
        }
    </script>
</body>
</html>
