<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NootaChat Sovereign Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090e11; --panel-dark: #111b21; --primary: #8A2BE2;
            --secondary: #202c33; --text-main: #e9edef; --text-dim: #8696a0; --danger: #ff4757;
            --ghost: #00f2ff; --success: #4cd137;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-touch-callout: none; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        /* الحماية من الاسكرين شوت (نظرياً للمتصفحات الداعمة) */
        @media screen { body { overflow: auto; } }
        img { pointer-events: none; -webkit-user-drag: none; }

        /* الأزرار والمدخلات */
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .input-group { background: var(--secondary); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid #2f3e46; width: 100%; }
        input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; text-align: center; }

        /* شريط التنقل */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--panel-dark); display: flex; border-top: 1px solid #222d34; height: 70px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: var(--text-dim); }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        /* النوتس */
        .notes-container { display: flex; gap: 15px; padding: 20px; overflow-x: auto; background: var(--bg-dark); }
        .note-circle { width: 68px; height: 68px; border-radius: 50%; border: 2.5px solid var(--primary); position: relative; background: var(--secondary); padding: 2px; }
        .note-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .note-txt { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: white; color: black; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; white-space: nowrap; }

        /* الشات */
        #chat-window { position: fixed; top: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 200; display: flex; flex-direction: column; }
        .msg-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { max-width: 80%; padding: 10px 15px; margin: 5px; border-radius: 15px; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--secondary); border-bottom-left-radius: 2px; }
        .system-msg { align-self: center; background: rgba(255,255,255,0.1); font-size: 11px; color: var(--text-dim); padding: 5px 15px; border-radius: 20px; margin: 10px; }

        /* المودال */
        .modal { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-screen" class="modal">
        <h1 style="color:var(--primary); font-size:40px;">NootaChat</h1>
        <div class="input-group"><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
        <div class="input-group"><input type="password" id="pass" placeholder="كلمة المرور"></div>
        <button class="btn-primary" onclick="handleAuth('login')">دخول</button>
        <p onclick="document.getElementById('signup-box').classList.remove('hidden')" style="margin-top:20px; color:var(--text-dim);">ليس لديك حساب؟ سجل هنا</p>
        
        <div id="signup-box" class="modal hidden">
             <h2>إنشاء حساب</h2>
             <div class="input-group"><input type="email" id="s-email" placeholder="بريد جديد"></div>
             <div class="input-group"><input type="password" id="s-pass" placeholder="كلمة مرور"></div>
             <button class="btn-primary" onclick="handleAuth('signup')">إنشاء الحساب</button>
             <button onclick="document.getElementById('signup-box').classList.add('hidden')" style="background:none; border:none; color:white; margin-top:15px;">إلغاء</button>
        </div>
    </div>

    <div id="setup-screen" class="modal hidden">
        <h2 id="setup-title">إعداد حسابك</h2>
        <div style="position:relative; margin:20px;">
            <img id="preview-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--primary);">
            <input type="file" id="avatar-input" accept="image/*" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0;">
        </div>
        <div class="input-group" id="user-group"><input type="text" id="setup-user" placeholder="اسم المستخدم (Username)"></div>
        <div class="input-group"><input type="text" id="setup-nick" placeholder="اللقب (الاسم الظاهر)"></div>
        <button class="btn-primary" onclick="saveProfile()">حفظ البيانات</button>
    </div>

    <div id="main-app" class="hidden" style="height:100%;">
        <div id="page-chats">
            <div style="padding:20px; font-size:24px; font-weight:bold;">المحادثات</div>
            <div class="notes-container" id="notes-list">
                <div onclick="addNote()" style="min-width:70px; text-align:center;">
                    <div class="note-circle" style="border:2px dashed #444; color:#888; display:flex; align-items:center; justify-content:center; font-size:30px;">+</div>
                </div>
            </div>
            <div id="chat-list" style="padding-bottom:100px;"></div>
            <button class="btn-primary" style="position:fixed; bottom:85px; width:90%; right:5%;" onclick="findUser()">+ محادثة جديدة</button>
        </div>

        <div id="page-profile" class="hidden" style="padding:40px; text-align:center;">
            <img id="my-img" src="" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
            <h2 id="my-nick">...</h2>
            <p id="my-user" style="color:var(--text-dim)">@...</p>
            <button class="btn-primary" style="margin-top:20px; background:var(--secondary);" onclick="openEditProfile()">تعديل البروفايل</button>
            <button class="btn-primary" style="margin-top:20px; background:var(--danger);" onclick="location.reload()">تسجيل خروج</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showTab('chats', this)">💬<span>دردشة</span></div>
            <div class="nav-item" onclick="showTab('profile', this)">👤<span>حسابي</span></div>
        </nav>
    </div>

    <div id="chat-window" class="hidden">
        <div style="padding:15px; background:var(--panel-dark); display:flex; align-items:center; justify-content:space-between;">
            <div style="display:flex; align-items:center;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:20px; margin-left:10px;">→</button>
                <img id="chat-img" src="" style="width:35px; height:35px; border-radius:50%; margin-left:10px; object-fit:cover;">
                <b id="chat-name">...</b>
            </div>
            <button id="block-btn" style="background:none; border:none; color:var(--danger); font-size:12px;"></button>
        </div>
        <div id="msg-box" class="msg-container"></div>
        <div id="input-area" style="padding:15px; background:var(--panel-dark); display:flex; gap:10px;">
            <input type="text" id="m-input" placeholder="اكتب..." style="flex:1; background:var(--secondary); border-radius:20px; padding:10px;">
            <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; border-radius:50%; width:40px; height:40px;">➤</button>
        </div>
        <div id="block-notice" class="hidden" style="padding:20px; text-align:center; background:var(--danger); font-size:14px;">لا يمكنك المراسلة، لقد تم حظرك</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let me = null, activeF = null, activeC = null, isBlockedByMe = false;

        window.handleAuth = async (type) => {
            const e = document.getElementById(type==='login'?'email':'s-email').value;
            const p = document.getElementById(type==='login'?'pass':'s-pass').value;
            try { type==='login' ? await signInWithEmailAndPassword(auth,e,p) : await createUserWithEmailAndPassword(auth,e,p); }
            catch(err) { alert("خطأ في العملية"); }
        };

        const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); });
        document.getElementById('avatar-input').onchange = async e => { if(e.target.files[0]) document.getElementById('preview-img').src = await toB64(e.target.files[0]); };

        window.saveProfile = async () => {
            const u = document.getElementById('setup-user').value.trim().toLowerCase();
            const n = document.getElementById('setup-nick').value.trim();
            const img = document.getElementById('preview-img').src;
            if(!n) return alert("اللقب مطلوب");
            
            const uid = auth.currentUser.uid;
            if(me) { // تعديل
                await update(ref(db, 'users/'+uid), { n, img });
            } else { // إنشاء لأول مرة
                const snap = await get(child(ref(db), 'usernames/'+u));
                if(snap.exists()) return alert("اليوزر نيم مأخوذ");
                await set(ref(db, 'users/'+uid), { u, n, img, reports: 0 });
                await set(ref(db, 'usernames/'+u), uid);
            }
            location.reload();
        };

        window.openEditProfile = () => {
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('setup-title').innerText = "تعديل البيانات";
            document.getElementById('user-group').classList.add('hidden');
            document.getElementById('setup-nick').value = me.n;
            document.getElementById('preview-img').src = me.img;
        };

        window.showTab = (t, el) => {
            document.getElementById('page-chats').classList.toggle('hidden', t!=='chats');
            document.getElementById('page-profile').classList.toggle('hidden', t!=='profile');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        window.findUser = async () => {
            const name = prompt("Username:");
            if(!name) return;
            const snap = await get(child(ref(db), 'usernames/'+name.toLowerCase()));
            if(snap.exists()) {
                const fId = snap.val();
                const fData = (await get(child(ref(db), 'users/'+fId))).val();
                openChat(fId, fData.n, fData.img);
            } else alert("غير موجود");
        };

        window.openChat = async (id, name, img) => {
            activeF = id; activeC = [auth.currentUser.uid, id].sort().join("_");
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-img').src = img;
            
            // تحديث قائمة الأصدقاء (بمجرد فتح الشات تصبحون أصدقاء لمشاهدة النوتس)
            await update(ref(db, `friends/${auth.currentUser.uid}/${id}`), { exists: true });
            await update(ref(db, `friends/${id}/${auth.currentUser.uid}`), { exists: true });
            
            checkBlockStatus();
            loadMsgs();
        };

        window.closeChat = () => document.getElementById('chat-window').classList.add('hidden');

        function checkBlockStatus() {
            onValue(ref(db, `blocks/${activeF}/${auth.currentUser.uid}`), s => {
                const isBlocked = s.exists();
                document.getElementById('input-area').classList.toggle('hidden', isBlocked);
                document.getElementById('block-notice').classList.toggle('hidden', !isBlocked);
            });
            onValue(ref(db, `blocks/${auth.currentUser.uid}/${activeF}`), s => {
                isBlockedByMe = s.exists();
                document.getElementById('block-btn').innerText = isBlockedByMe ? "فك الحظر" : "حظر";
                document.getElementById('block-btn').onclick = toggleBlock;
            });
        }

        window.toggleBlock = async () => {
            if(isBlockedByMe) {
                await remove(ref(db, `blocks/${auth.currentUser.uid}/${activeF}`));
                push(ref(db, 'messages/'+activeC), { sys: "تم فك الحظر" });
            } else {
                await set(ref(db, `blocks/${auth.currentUser.uid}/${activeF}`), true);
                push(ref(db, 'messages/'+activeC), { sys: "لقد قمت بحظر هذا المستخدم" });
            }
        };

        window.sendMsg = () => {
            const t = document.getElementById('m-input').value; if(!t) return;
            push(ref(db, 'messages/'+activeC), { s: auth.currentUser.uid, t, time: Date.now() });
            document.getElementById('m-input').value = "";
        };

        function loadMsgs() {
            onValue(ref(db, 'messages/'+activeC), snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val(), d = document.createElement('div');
                    if(m.sys) { d.className="system-msg"; d.innerText=m.sys; }
                    else { d.className=`msg ${m.s===auth.currentUser.uid?'sent':'received'}`; d.innerText=m.t; }
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.addNote = async () => {
            const t = prompt("ماذا يدور في ذهنك؟");
            if(t) await set(ref(db, 'notes/'+auth.currentUser.uid), { t, n: me.n, img: me.img, time: Date.now() });
        };

        onAuthStateChanged(auth, async u => {
            if(u) {
                const snap = await get(child(ref(db), 'users/'+u.uid));
                if(snap.exists()) {
                    me = snap.val();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('my-img').src = me.img;
                    document.getElementById('my-nick').innerText = me.n;
                    document.getElementById('my-user').innerText = "@" + me.u;
                    initApp();
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('setup-screen').classList.remove('hidden');
                }
            }
        });

        function initApp() {
            // جلب النوتس للأصدقاء فقط
            onValue(ref(db, 'notes'), snap => {
                const nList = document.getElementById('notes-list'); nList.innerHTML = nList.firstElementChild.outerHTML;
                snap.forEach(c => {
                    get(child(ref(db), `friends/${auth.currentUser.uid}/${c.key}`)).then(isFriend => {
                        if(isFriend.exists() || c.key === auth.currentUser.uid) {
                            const n = c.val();
                            if(Date.now() - n.time < 86400000) {
                                const d = document.createElement('div');
                                d.innerHTML = `<div class="note-circle"><div class="note-txt">${n.t}</div><img src="${n.img}"></div>`;
                                nList.appendChild(d);
                            }
                        }
                    });
                });
            });
            // قائمة الشات
            onValue(ref(db, `friends/${auth.currentUser.uid}`), snap => {
                const list = document.getElementById('chat-list'); list.innerHTML = "";
                snap.forEach(c => {
                    get(child(ref(db), 'users/'+c.key)).then(uSnap => {
                        const u = uSnap.val();
                        const d = document.createElement('div');
                        d.style = "display:flex; align-items:center; padding:15px; border-bottom:1px solid #222d34;";
                        d.onclick = () => openChat(c.key, u.n, u.img);
                        d.innerHTML = `<img src="${u.img}" style="width:50px; height:50px; border-radius:50%; margin-left:15px; object-fit:cover;"><b>${u.n}</b>`;
                        list.appendChild(d);
                    });
                });
            });
        }
    </script>
</body>
</html>
