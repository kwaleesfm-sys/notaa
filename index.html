<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ZAGEL V4 | زاجل الأسطوري</title>
    
    <link rel="manifest" id="pwa-manifest">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0d0d12; --surface: #1a1a24; --surface-light: #252533;
            --accent-blue: #00f3ff; --accent-pink: #ff007c; --text-main: #ffffff;
            --text-muted: #a0a0a0; --font-family: 'Tajawal', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-family); background-color: var(--bg); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .hidden { display: none !important; }
        .neon-text { text-shadow: 0 0 10px var(--accent-blue); color: var(--accent-blue); }
        .btn { background: linear-gradient(45deg, var(--accent-blue), #007bb5); border: none; color: #000; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-pink { background: linear-gradient(45deg, var(--accent-pink), #b50058); color: #fff; }
        
        input, textarea { background: var(--surface-light); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 10px; }
        
        header { background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .main-content { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; position: relative; }
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* شريط التنقل */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 10px 0; z-index: 20; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: var(--text-muted); font-size: 1.2rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item span { font-size: 0.6rem; margin-top: 3px; font-weight: bold; }
        .nav-item.active { color: var(--accent-blue); transform: translateY(-3px); text-shadow: 0 0 10px var(--accent-blue); }

        /* القصص (Stories) */
        .stories-bar { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .story-ring { min-width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--accent-pink); padding: 2px; position: relative; cursor: pointer; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-add-btn { position: absolute; bottom: 0; right: 0; background: var(--accent-blue); color: #000; border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; border: 2px solid var(--bg); }

        /* النوتس (Notes) */
        .notes-bar { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .note-container { display: flex; flex-direction: column; align-items: center; position: relative; min-width: 70px; cursor: pointer; }
        .note-bubble { background: var(--surface-light); padding: 8px 10px; border-radius: 15px; font-size: 0.75rem; text-align: center; margin-bottom: -10px; z-index: 2; border: 1px solid rgba(0,243,255,0.2); max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .note-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--surface-light); }

        /* المنشورات واكتشف */
        .post-card { background: var(--surface); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .post-user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .username-tag { font-size: 0.75rem; color: var(--accent-blue); }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-size: 1.1rem; }
        .post-img { width: 100%; border-radius: 10px; margin: 10px 0; max-height: 400px; object-fit: cover; }
        
        .explore-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .explore-item { background: var(--surface); border-radius: 10px; padding: 10px; text-align: center; }

        /* الريلز (Reels) */
        #tab-reels { padding: 0; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-container { height: calc(100vh - 140px); width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        .reel-video { width: 100%; height: 100%; object-fit: cover; }
        .reel-ui { position: absolute; bottom: 20px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .reel-actions { display: flex; flex-direction: column; gap: 20px; font-size: 1.5rem; }

        /* Modals */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; display:flex; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: var(--surface); width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; position: relative; }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        
        .create-fab { position: fixed; bottom: 80px; left: 20px; width: 60px; height: 60px; background: var(--accent-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: #000; box-shadow: 0 4px 15px rgba(0,243,255,0.4); cursor: pointer; z-index: 15; }
        
        /* Story Viewer */
        #story-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .story-progress { position: absolute; top: 10px; left: 10px; right: 10px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .story-bar { height: 100%; background: #fff; width: 0%; transition: width linear; }
    </style>
</head>
<body>

    <div id="auth-page" class="modal" style="background: var(--bg);">
        <div style="width: 100%; max-width: 350px; text-align: center;">
            <h1 class="neon-text" style="font-size: 3.5rem; margin-bottom: 20px; font-weight: 900;">ZAGEL</h1>
            <div id="login-box">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
                <input type="password" id="password" placeholder="كلمة المرور">
                <div id="register-fields" class="hidden">
                    <input type="text" id="fullname" placeholder="الاسم الكامل (اللقب)">
                    <input type="text" id="username" placeholder="اليوزر نيم (@)">
                </div>
                <button class="btn" id="btn-action" style="width: 100%; margin-top: 10px;">دخول</button>
                <p id="switch-auth" style="margin-top: 20px; font-size: 0.9rem; cursor: pointer; color: var(--text-muted);">ليس لديك حساب؟ <span style="color: var(--accent-pink);">سجل الآن</span></p>
            </div>
        </div>
    </div>

    <div id="app-page" class="hidden">
        <header>
            <div class="neon-text" style="font-weight: 900; font-size: 1.5rem;">زاجل V4</div>
            <img src="" id="header-avatar" class="avatar" style="width: 35px; height: 35px;">
        </header>

        <div class="main-content">
            <div id="tab-home" class="tab-content active">
                <div class="stories-bar" id="stories-container">
                    <div class="story-ring" onclick="document.getElementById('add-story-modal').classList.remove('hidden')">
                        <img src="" id="my-story-avatar">
                        <div class="story-add-btn"><i class="fa-solid fa-plus"></i></div>
                    </div>
                </div>
                <div id="posts-container"></div>
            </div>

            <div id="tab-explore" class="tab-content">
                <h3 style="margin-bottom: 15px;">منشورات رائجة 🌍</h3>
                <div class="explore-grid" id="explore-container"></div>
            </div>

            <div id="tab-reels" class="tab-content">
                <div id="reels-container"></div>
                <div class="create-fab" style="background: var(--accent-pink); bottom: 150px;" onclick="document.getElementById('add-reel-modal').classList.remove('hidden')">
                    <i class="fa-solid fa-video"></i>
                </div>
            </div>

            <div id="tab-inbox" class="tab-content">
                <div class="notes-bar" id="notes-container">
                    <div class="note-container" onclick="addNotePrompt()">
                        <div class="note-bubble">أضف ملاحظة +</div>
                        <img src="" id="my-note-avatar" class="note-avatar">
                    </div>
                </div>
                <h3 style="margin-bottom: 15px;">المحادثات <i class="fa-solid fa-message"></i></h3>
                <div id="inbox-list"></div>
            </div>

            <div id="tab-profile" class="tab-content">
                <div style="text-align: center; padding: 20px; background: var(--surface); border-radius: 20px;">
                    <img src="" id="my-profile-avatar" class="avatar" style="width: 90px; height: 90px; margin-bottom: 10px;">
                    <h2 id="my-name"></h2>
                    <p id="my-username" class="username-tag"></p>
                    <button class="btn btn-pink" id="btn-logout" style="width: 100%; margin-top: 20px;">تسجيل الخروج</button>
                </div>
            </div>
        </div>

        <div class="create-fab" onclick="document.getElementById('post-modal').classList.remove('hidden')">
            <i class="fa-solid fa-pen"></i>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showTab('home')"><i class="fa-solid fa-house"></i><span>الرئيسية</span></div>
            <div class="nav-item" onclick="showTab('explore')"><i class="fa-solid fa-magnifying-glass"></i><span>اكتشف</span></div>
            <div class="nav-item" onclick="showTab('reels')"><i class="fa-solid fa-play"></i><span>ريلز</span></div>
            <div class="nav-item" onclick="showTab('inbox')"><i class="fa-solid fa-inbox"></i><span>الرسائل</span></div>
            <div class="nav-item" onclick="showTab('profile')"><i class="fa-solid fa-user"></i><span>حسابي</span></div>
        </nav>
    </div>

    <div id="post-modal" class="modal hidden">
        <div class="modal-content">
            <i class="fa-solid fa-times close-modal" onclick="document.getElementById('post-modal').classList.add('hidden')"></i>
            <h3 style="margin-bottom: 15px; color: var(--accent-blue);">إنشاء منشور</h3>
            <textarea id="post-text" placeholder="ماذا يدور في ذهنك؟" rows="3"></textarea>
            
            <label style="font-size: 0.8rem; color: var(--text-muted);">رابط أغنية (يوتيوب أو سبوتيفاي):</label>
            <input type="text" id="post-music" placeholder="ضع الرابط هنا...">
            
            <input type="file" id="post-img" accept="image/*" style="margin-bottom: 15px;">
            <button class="btn" id="btn-publish" style="width: 100%;">نشر الآن <i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="add-reel-modal" class="modal hidden">
        <div class="modal-content">
            <i class="fa-solid fa-times close-modal" onclick="document.getElementById('add-reel-modal').classList.add('hidden')"></i>
            <h3 style="margin-bottom: 15px; color: var(--accent-pink);"><i class="fa-solid fa-video"></i> تصوير/رفع ريلز</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">الريلز يتم رفعه على Storage لضمان السرعة.</p>
            
            <label class="btn" style="display:block; text-align:center; margin-bottom:10px;">
                <i class="fa-solid fa-camera"></i> اختر أو صوّر فيديو
                <input type="file" id="reel-video-file" accept="video/*" capture="camcorder" class="hidden">
            </label>
            
            <label class="btn btn-pink" style="display:block; text-align:center; margin-bottom:15px;">
                <i class="fa-solid fa-music"></i> اختر "ساوند" للخلفية (اختياري)
                <input type="file" id="reel-audio-file" accept="audio/*" class="hidden">
            </label>
            
            <input type="text" id="reel-caption" placeholder="اكتب وصفاً للريلز...">
            <button class="btn" id="btn-upload-reel" style="width: 100%;">رفع الريلز</button>
        </div>
    </div>

    <div id="add-story-modal" class="modal hidden">
        <div class="modal-content">
            <i class="fa-solid fa-times close-modal" onclick="document.getElementById('add-story-modal').classList.add('hidden')"></i>
            <h3 style="margin-bottom: 15px;">إضافة قصة (Story)</h3>
            <input type="file" id="story-img" accept="image/*">
            <button class="btn btn-pink" id="btn-upload-story" style="width: 100%;">نشر القصة</button>
        </div>
    </div>

    <div id="story-viewer" class="hidden" onclick="closeStory()">
        <div class="story-progress"><div class="story-bar" id="story-progress-bar"></div></div>
        <img src="" id="story-viewer-img" style="width: 100%; max-height: 90vh; object-fit: contain;">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, limit, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
            authDomain: "fir-c3e88.firebaseapp.com",
            databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
            projectId: "fir-c3e88",
            storageBucket: "fir-c3e88.firebasestorage.app",
            messagingSenderId: "202130175288",
            appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let me = null;
        let myData = null;
        let isRegister = false;

        // PWA Setup (ديناميكي)
        const manifestData = {
            "name": "Zagel App", "short_name": "Zagel", "start_url": ".", "display": "standalone",
            "background_color": "#0d0d12", "theme_color": "#0d0d12",
            "icons": [{"src": "https://ui-avatars.com/api/?name=Z&background=00f3ff&color=000&size=512", "sizes": "512x512", "type": "image/png"}]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);
        if('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', function(e) {});`;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }

        // تحويل الصورة لـ Base64 للمنشورات
        const fileToBase64 = (file) => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.onerror = rej;
            reader.readAsDataURL(file);
        });

        // استخراج روابط الأغاني (يوتيوب وسبوتيفاي)
        function extractEmbedLink(url) {
            if(!url) return null;
            if(url.includes("spotify.com")) {
                const match = url.match(/spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);
                return match ? `https://open.spotify.com/embed/${match[1]}/${match[2]}` : null;
            }
            if(url.includes("youtube.com") || url.includes("youtu.be")) {
                const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
                return match ? `https://www.youtube.com/embed/${match[1]}` : null;
            }
            return null;
        }

        // --- التوثيق ---
        document.getElementById('switch-auth').onclick = () => {
            isRegister = !isRegister;
            document.getElementById('btn-action').innerText = isRegister ? 'إنشاء حساب جديد' : 'دخول';
            document.getElementById('register-fields').classList.toggle('hidden');
        };

        document.getElementById('btn-action').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            try {
                if(isRegister) {
                    const fullname = document.getElementById('fullname').value;
                    const username = document.getElementById('username').value.replace('@', '');
                    if(!fullname || !username) return alert("املأ الاسم واليوزر نيم");
                    
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: fullname });
                    await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, name: fullname, username: `@${username}` });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                me = user;
                const userDoc = await getDoc(doc(db, "users", me.uid));
                myData = userDoc.data();
                
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('app-page').classList.remove('hidden');
                
                const av = `https://ui-avatars.com/api/?name=${me.displayName}&background=00f3ff&color=000`;
                document.getElementById('header-avatar').src = av;
                document.getElementById('my-story-avatar').src = av;
                document.getElementById('my-note-avatar').src = av;
                document.getElementById('my-profile-avatar').src = av;
                document.getElementById('my-name').innerText = me.displayName;
                document.getElementById('my-username').innerText = myData.username || "";

                loadPosts();
                loadExplore();
                loadStories();
                loadNotes();
                loadReels();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('app-page').classList.add('hidden');
            }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // --- النشر والتحميل ---
        document.getElementById('btn-publish').onclick = async () => {
            const btn = document.getElementById('btn-publish');
            const text = document.getElementById('post-text').value;
            const musicLink = document.getElementById('post-music').value;
            const fileInput = document.getElementById('post-img');
            
            if(!text && !fileInput.files[0] && !musicLink) return;

            // تفعيل حالة التحميل لمنع التكرار
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري النشر...';

            let imgB64 = null;
            if(fileInput.files[0]) {
                imgB64 = await fileToBase64(fileInput.files[0]);
            }

            await addDoc(collection(db, "posts"), {
                uid: me.uid, name: me.displayName, username: myData.username,
                text: text, image: imgB64, embed: extractEmbedLink(musicLink),
                createdAt: serverTimestamp()
            });

            document.getElementById('post-modal').classList.add('hidden');
            document.getElementById('post-text').value = "";
            document.getElementById('post-music').value = "";
            fileInput.value = "";
            btn.disabled = false;
            btn.innerHTML = 'نشر الآن <i class="fa-solid fa-paper-plane"></i>';
        };

        // حذف المنشور
        window.deletePost = async (id) => {
            if(confirm("هل أنت متأكد من حذف المنشور؟")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };

        // عرض المنشورات
        function renderPostCards(containerId, snap, isExplore = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            snap.forEach(d => {
                const post = d.data();
                if(isExplore && post.uid === me.uid) return; // إخفاء منشوراتي من الاستكشاف

                const html = `
                    <div class="post-card ${isExplore ? 'explore-item' : ''}">
                        <div class="post-header">
                            <div class="post-user-info">
                                <img src="https://ui-avatars.com/api/?name=${post.name}" class="avatar" style="${isExplore ? 'width:30px;height:30px;' : ''}">
                                <div>
                                    <b style="font-size: ${isExplore ? '0.8rem' : '1rem'}">${post.name}</b>
                                    ${!isExplore ? `<div class="username-tag">${post.username||''}</div>` : ''}
                                </div>
                            </div>
                            ${post.uid === me.uid && !isExplore ? `<i class="fa-solid fa-trash delete-btn" onclick="deletePost('${d.id}')"></i>` : ''}
                        </div>
                        ${!isExplore ? `<p>${post.text}</p>` : `<p style="font-size:0.8rem; white-space:nowrap; overflow:hidden;">${post.text}</p>`}
                        ${post.image ? `<img src="${post.image}" class="post-img">` : ''}
                        ${post.embed && !isExplore ? `<iframe src="${post.embed}" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>` : ''}
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function loadPosts() {
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(30)), (snap) => {
                renderPostCards("posts-container", snap, false);
            });
        }

        function loadExplore() {
            // جلب عشوائي/عام لمنشورات للاستكشاف
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(20)), (snap) => {
                renderPostCards("explore-container", snap, true);
            });
        }

        // --- النوتس (Notes) ---
        window.addNotePrompt = async () => {
            const text = prompt("اكتب ملاحظتك (60 حرف كحد أقصى):");
            if(text && text.length <= 60) {
                await setDoc(doc(db, "notes", me.uid), {
                    uid: me.uid, name: me.displayName, text: text, createdAt: Date.now()
                });
            }
        };

        function loadNotes() {
            onSnapshot(collection(db, "notes"), (snap) => {
                const container = document.getElementById('notes-container');
                // الاحتفاظ بزر الإضافة الخاص بي
                container.innerHTML = `
                    <div class="note-container" onclick="addNotePrompt()">
                        <div class="note-bubble">أضف ملاحظة +</div>
                        <img src="https://ui-avatars.com/api/?name=${me.displayName}&background=00f3ff&color=000" class="note-avatar">
                    </div>
                `;
                const now = Date.now();
                snap.forEach(d => {
                    const note = d.data();
                    if(note.uid === me.uid) return;
                    if(now - note.createdAt > 86400000) { deleteDoc(doc(db, "notes", d.id)); return; } // حذف بعد 24 ساعة

                    container.innerHTML += `
                        <div class="note-container">
                            <div class="note-bubble">${note.text}</div>
                            <img src="https://ui-avatars.com/api/?name=${note.name}" class="note-avatar">
                        </div>
                    `;
                });
            });
        }

        // --- القصص (Stories) ---
        document.getElementById('btn-upload-story').onclick = async () => {
            const file = document.getElementById('story-img').files[0];
            if(!file) return;
            const b64 = await fileToBase64(file);
            await addDoc(collection(db, "stories"), { uid: me.uid, name: me.displayName, image: b64, createdAt: Date.now() });
            document.getElementById('add-story-modal').classList.add('hidden');
        };

        function loadStories() {
            onSnapshot(collection(db, "stories"), (snap) => {
                const container = document.getElementById('stories-container');
                const now = Date.now();
                
                // تنظيف القديم والاحتفاظ بزر الإضافة
                Array.from(container.children).forEach(c => {
                    if(!c.querySelector('.story-add-btn')) c.remove();
                });

                snap.forEach(d => {
                    const story = d.data();
                    if(now - story.createdAt > 86400000) { deleteDoc(doc(db, "stories", d.id)); return; }
                    
                    const div = document.createElement('div');
                    div.className = 'story-ring';
                    div.innerHTML = `<img src="https://ui-avatars.com/api/?name=${story.name}">`;
                    div.onclick = () => viewStory(story.image);
                    container.appendChild(div);
                });
            });
        }

        let storyTimer;
        window.viewStory = (imgUrl) => {
            document.getElementById('story-viewer-img').src = imgUrl;
            document.getElementById('story-viewer').classList.remove('hidden');
            const bar = document.getElementById('story-progress-bar');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(() => { bar.style.transition = 'width 5s linear'; bar.style.width = '100%'; }, 50);
            storyTimer = setTimeout(closeStory, 5000);
        };
        window.closeStory = () => {
            document.getElementById('story-viewer').classList.add('hidden');
            clearTimeout(storyTimer);
        };

        // --- الريلز (Reels with Sound via Firebase Storage) ---
        document.getElementById('btn-upload-reel').onclick = async () => {
            const btn = document.getElementById('btn-upload-reel');
            const vidFile = document.getElementById('reel-video-file').files[0];
            const audioFile = document.getElementById('reel-audio-file').files[0];
            const caption = document.getElementById('reel-caption').value;
            
            if(!vidFile) return alert("اختر فيديو أولاً");

            btn.disabled = true;
            btn.innerHTML = 'جاري الرفع لـ Storage...';

            try {
                // رفع الفيديو لـ Firebase Storage لتخطي حدود Base64
                const vidRef = sRef(storage, `reels/${Date.now()}_vid.mp4`);
                await uploadBytes(vidRef, vidFile);
                const vidUrl = await getDownloadURL(vidRef);

                let audioUrl = null;
                if(audioFile) {
                    const audRef = sRef(storage, `reels/${Date.now()}_aud.mp3`);
                    await uploadBytes(audRef, audioFile);
                    audioUrl = await getDownloadURL(audRef);
                }

                await addDoc(collection(db, "reels"), {
                    uid: me.uid, name: me.displayName, caption: caption,
                    videoUrl: vidUrl, audioUrl: audioUrl, createdAt: serverTimestamp()
                });

                document.getElementById('add-reel-modal').classList.add('hidden');
            } catch(e) {
                alert("خطأ في الرفع: " + e.message);
            }
            btn.disabled = false;
            btn.innerHTML = 'رفع الريلز';
        };

        function loadReels() {
            onSnapshot(query(collection(db, "reels"), orderBy("createdAt", "desc")), (snap) => {
                const container = document.getElementById('reels-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    const reel = d.data();
                    const reelId = d.id;
                    
                    const div = document.createElement('div');
                    div.className = 'reel-container';
                    div.innerHTML = `
                        <video id="vid-${reelId}" class="reel-video" loop playsinline src="${reel.videoUrl}"></video>
                        ${reel.audioUrl ? `<audio id="aud-${reelId}" src="${reel.audioUrl}" loop></audio>` : ''}
                        <div class="reel-ui">
                            <div>
                                <h3 style="margin-bottom:5px;">@${reel.name}</h3>
                                <p style="font-size:0.9rem;">${reel.caption}</p>
                                ${reel.audioUrl ? `<p style="font-size:0.7rem; color:var(--accent-pink); margin-top:5px;"><i class="fa-solid fa-music"></i> ساوند مخصص</p>` : ''}
                            </div>
                            <div class="reel-actions">
                                <i class="fa-solid fa-heart" style="cursor:pointer;" onclick="this.style.color='#ff007c'"></i>
                                <i class="fa-solid fa-comment"></i>
                                <i class="fa-solid fa-share"></i>
                            </div>
                        </div>
                    `;
                    
                    // تشغيل الفيديو والصوت عند النقر
                    div.onclick = () => {
                        const v = document.getElementById(`vid-${reelId}`);
                        const a = document.getElementById(`aud-${reelId}`);
                        if(v.paused) { 
                            v.play(); 
                            if(a) a.play(); 
                        } else { 
                            v.pause(); 
                            if(a) a.pause(); 
                        }
                    };
                    container.appendChild(div);
                });
            });
        }

        // Navigation
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');
        };

    </script>
</body>
</html>
